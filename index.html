<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Tecnologia em Energia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-teal: #00C2A8;
            --color-dips-navy: #0D1B2A;
            --color-dips-blue-dark: #1B263B;
        }
        
        body { 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
        }

        #main-scroller { height: 1600vh; position: relative; }

        .viewport-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
        }

        /* HERO SEMPRE POR CIMA NO INÍCIO */
        #hero-canvas { z-index: 10; object-fit: cover; }
        
        /* PRODUTOS COMEÇAM POR BAIXO E INVISÍVEIS */
        #products-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            z-index: 1; opacity: 0; 
        }

        #webgl-canvas { z-index: 5; opacity: 0; }

        .uix-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            padding: 50px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.5); }
        
        .btn-premium {
            background: white;
            color: #0D1B2A;
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background: #00C2A8;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="antialiased">

    <div id="dips-loader" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;justify-content:center;align-items:center;">
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.1);"><div id="progress-bar" style="height:100%;background:#00C2A8;width:0%;"></div></div>
    </div>

    <div id="products-bg"></div>

    <nav id="navbar" class="fixed top-0 z-[100] glass-navbar px-8 py-3 flex justify-between items-center opacity-0">
        <div class="hidden md:block w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white cursor-pointer"></i></div>
    </nav>

    <div id="main-scroller">
        <div class="viewport-container"><canvas id="hero-canvas"></canvas></div>
        <div class="viewport-container"><canvas id="webgl-canvas"></canvas></div>

        <div class="fixed inset-0 flex flex-col justify-center items-center z-[60] pointer-events-none">
            <div id="hero-txt" class="opacity-0 text-center">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter font-display">O FUTURO</h1>
                <h1 class="text-7xl md:text-9xl font-black text-dips-teal tracking-tighter uppercase font-display text-glow">ENERGIA.</h1>
            </div>

            <div id="uix-container" class="opacity-0 translate-y-24 w-full max-w-xl px-6">
                <div class="uix-card pointer-events-auto">
                    <div class="w-full">
                        <span class="text-dips-teal uppercase tracking-[0.4em] text-[10px] font-bold mb-4 block">Hardware de Alta Performance</span>
                        <h2 id="p-title" class="text-3xl md:text-5xl font-black uppercase font-display mb-6">PRODUTO</h2>
                        <p id="p-desc" class="text-gray-400 text-sm md:text-base leading-relaxed font-light mb-10 max-w-sm mx-auto">
                            Carregando especificações...
                        </p>
                        <button class="btn-premium">Explorar Detalhes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        gsap.registerPlugin(ScrollTrigger);

        // --- SETUP THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 8;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        const studioLight = new THREE.SpotLight(0x00C2A8, 60); studioLight.position.set(5, 5, 5); scene.add(studioLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        const productData = [
            { name: "Painel HP 160W", desc: "Módulo monocristalino de ultra eficiência projetado para máxima captação sob condições de baixa luminosidade.", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão inteligente de carga com proteção total contra surtos e otimização automatizada do ciclo das baterias.", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão de energia de alta fidelidade com monitoramento individual por módulo via Wi-Fi integrado.", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((d, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 3.5),
                new THREE.MeshStandardMaterial({ map: texLoader.load(d.img), transparent: true, metalness: 0.5, roughness: 0.3 })
            );
            mesh.position.y = -i * 12;
            scene.add(mesh);
            meshes.push(mesh);
        });

        const heroCanvas = document.getElementById('hero-canvas');
        const ctx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        function updateHero(prog) {
            const idx = Math.floor(prog * (frameCount - 1));
            if (images[idx]) {
                heroCanvas.width = window.innerWidth; heroCanvas.height = window.innerHeight;
                const img = images[idx];
                const ratio = Math.max(heroCanvas.width / images[idx].width, heroCanvas.height / images[idx].height);
                const w = img.width * ratio; const h = img.height * ratio;
                ctx.clearRect(0,0, heroCanvas.width, heroCanvas.height);
                ctx.drawImage(img, (heroCanvas.width-w)/2, (heroCanvas.height-h)/2, w, h);
            }
        }

        // --- MASTER TIMELINE ---
        const masterTl = gsap.timeline({
            scrollTrigger: { trigger: "#main-scroller", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });

        // 1. VÍDEO HERO (Frequência 0-4)
        masterTl.to({}, {
            duration: 4,
            onUpdate: function() {
                const p = this.progress() * 2.5; 
                if (p <= 1) updateHero(p);
            }
        }, 0);

        // 2. TEXTOS PORTUGUÊS HERO
        masterTl.to("#hero-txt", { opacity: 1, y: -20, duration: 1 }, 0.5);
        masterTl.to("#hero-txt", { opacity: 0, scale: 1.3, duration: 1 }, 2);

        // 3. TRANSIÇÃO CINEMATOGRÁFICA (AQUI O HERO SAI E OS PRODUTOS ENTRAM)
        masterTl.to("#hero-canvas", { opacity: 0, scale: 1.1, duration: 1.5, ease: "power2.inOut" }, 3.5);
        masterTl.to("#products-bg", { opacity: 1, duration: 1.5 }, 3.5);
        masterTl.to("#webgl-canvas", { opacity: 1, duration: 1.5 }, 3.5);

        // 4. CARDS DE PRODUTOS
        productData.forEach((p, i) => {
            masterTl.to(camera.position, {
                y: meshes[i].position.y,
                duration: 3,
                ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#uix-container", { opacity: 1, y: 0, duration: 0.8 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 4.5 + (i * 3));
        });

        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => { m.rotation.y = Math.sin(Date.now() * 0.001) * 0.12; });
            renderer.render(scene, camera);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                document.getElementById('progress-bar').style.width = (loaded/frameCount*100) + "%";
                if (loaded === frameCount) {
                    gsap.to("#dips-loader", { opacity: 0, duration: 1, onComplete: () => {
                        document.getElementById('dips-loader').style.display = 'none';
                    }});
                    gsap.to("#navbar", { opacity: 1, delay: 1 });
                    updateHero(0);
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
