<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | O Futuro da Energia</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
        }

        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            color: white;
            scrollbar-width: none; 
        }
        
        #hero-scroller { height: 1400vh; position: relative; }
        
        .canvas-container {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover;
            filter: saturate(1.1) contrast(1.1) brightness(0.85);
        }

        /* 🖼️ TEXTURA E BORDAS DO HERO (Vignette) */
        .hero-edges {
            position: fixed; inset: 0;
            z-index: 5;
            pointer-events: none;
            /* Gradiente que cria bordas texturizadas e profundidade */
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.9) 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            /* 📐 SUBI A LOGO: Reduzi o padding superior e aumentei o lateral */
            padding: 1.5rem 3rem; 
            pointer-events: none;
        }

        .logo-premium {
            @apply h-16 md:h-24 object-contain;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.8));
            /* Ajuste fino para "colar" mais no canto superior */
            transform: translateY(-10px); 
        }

        .headline-container {
            position: fixed;
            top: 40%; 
            left: 8%;
            transform: translateY(-50%);
            z-index: 50;
            pointer-events: none;
            width: 80%;
        }

        /* ✨ EFEITO PARALLAX NOS TEXTOS (GSAP vai controlar o movimento) */
        .parallax-wrapper {
            will-change: transform;
        }

        .premium-headline {
            font-family: 'Outfit', sans-serif;
            @apply text-5xl md:text-7xl lg:text-8xl font-black uppercase tracking-tighter leading-[0.9];
            opacity: 0;
            filter: blur(20px);
            transform: translateY(40px);
            will-change: transform, opacity, filter;
        }

        .sub-headline {
            @apply text-lg md:text-2xl font-light tracking-wide mt-8 max-w-xl opacity-0;
            filter: blur(10px);
            transform: translateY(30px);
            color: rgba(255, 255, 255, 0.7);
        }

        .text-glow { text-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 194, 168, 0.2); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-32 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-dips-teal w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div class="hero-edges"></div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="logo-premium">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <div class="headline-container">
        <div id="block-1" class="absolute parallax-wrapper">
            <h1 class="premium-headline text-glow">O FUTURO DA</h1>
            <h1 class="premium-headline text-dips-teal text-glow">ENERGIA.</h1>
        </div>

        <div id="block-2" class="absolute parallax-wrapper">
            <h1 class="premium-headline text-glow">TRANSFORME SOL EM</h1>
            <h1 class="premium-headline text-dips-teal text-glow">ECONOMIA REAL.</h1>
            <p class="sub-headline" id="sub-2">E reduza sua conta de energia todos os meses.</p>
        </div>
    </div>

    <section id="hero-scroller">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d", { alpha: false });
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                const canvasW = window.innerWidth;
                const canvasH = window.innerHeight;
                const scale = Math.max(canvasW / img.width, canvasH / img.height);
                const x = (canvasW / 2) - (img.width / 2) * scale;
                const y = (canvasH / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
            requestAnimationFrame(render);
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.8, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                render();
            }});

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero-scroller",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.2
                }
            });

            // 🎞️ MOTION VIDEO
            tl.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                duration: 15 
            }, 0);

            // ✨ 🎯 PARALLAX NOS TEXTOS (Efeito de profundidade no scroll)
            // Enquanto o vídeo rola, o texto se move em uma velocidade diferente (Y)
            tl.to(".parallax-wrapper", { y: -100, ease: "none", duration: 15 }, 0);

            // ATO 1
            tl.to("#block-1 .premium-headline", { 
                opacity: 1, y: 0, filter: "blur(0px)", duration: 2, stagger: 0.15 
            }, 0.5);
            
            tl.to("#block-1", { 
                opacity: 0, y: -120, filter: "blur(20px)", duration: 2.5 
            }, 4.5);

            // ATO 2
            tl.to("#block-2 .premium-headline", { 
                opacity: 1, y: 0, filter: "blur(0px)", duration: 2, stagger: 0.15 
            }, 6);
            
            tl.to("#sub-2", { 
                opacity: 1, y: 0, filter: "blur(0px)", duration: 1.5 
            }, 7);

            tl.to("#block-2", { 
                opacity: 0, y: -120, filter: "blur(20px)", duration: 2.5 
            }, 12.5);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
