<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }
        body { background-color: #0D1B2A; margin: 0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; color: white; -webkit-overflow-scrolling: touch; }
        
        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.4); }
        
        /* 🎨 ANIMAÇÃO DE TIPOGRAFIA (ESTADO INICIAL) */
        .char {
            display: inline-block;
            opacity: 0;
            filter: blur(10px);
            transform: translateY(20px) translateZ(0);
            will-change: transform, opacity, filter;
        }

        #scroll-hero { z-index: 20; position: relative; background-color: #0D1B2A; overflow: visible !important; }

        .wave-separator {
            position: absolute; bottom: -2px; left: 0; width: 100%; height: 150px; z-index: 30; pointer-events: none;
        }
        .wave-separator svg { width: 100%; height: 100%; fill: #FFFFFF; }

        #hero-canvas { transform: translateZ(0); filter: saturate(1.1) contrast(1.1) brightness(0.9); }

        .logo-adaptive { height: clamp(32px, 6vw, 64px); width: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.8)); }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <div class="w-48 h-[2px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0 transition-all duration-300"></div>
        </div>
    </div>

    <header class="fixed top-0 left-0 w-full z-[100] p-8 flex justify-between items-center pointer-events-none">
        <img src="logo/LOGO.png" alt="Dips" class="logo-adaptive pointer-events-auto">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <section id="scroll-hero" style="height:850vh;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"></canvas>
            
            <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(13,27,42,0.95) 0%, rgba(13,27,42,0.4) 40%, transparent 100%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:flex-end; padding:10vh 8vw;">
                <div id="hero-text-container" class="relative w-full max-w-6xl mx-auto">
                    
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full">
                        <h1 class="font-display text-5xl md:text-8xl lg:text-9xl font-black leading-[0.85] tracking-tighter uppercase text-intel-white split-text">
                            O Futuro da <br/> <span class="text-intel-green-light text-glow">Energia™</span>
                        </h1>
                        <p class="mt-6 text-lg md:text-2xl max-w-xl text-intel-white/60 opacity-0 sub-text">
                            Hardware de última geração projetado para eficiência absoluta.
                        </p>
                    </div>

                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0">
                        <h2 class="font-display text-4xl md:text-7xl lg:text-8xl font-black leading-[0.9] tracking-tighter uppercase split-text-2">
                            Transforme sol em <br/> <span class="text-intel-orange">Economia Real.</span>
                        </h2>
                        <p class="mt-6 text-lg md:text-2xl max-w-xl text-intel-white/60 opacity-0 sub-text-2">
                            Reduza sua conta todos os meses com tecnologia modular.
                        </p>
                    </div>
                </div>
            </div>

            <div class="wave-separator">
                <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                    <path id="wave-path" d="M0,192L120,202.7C240,213,480,235,720,234.7C960,235,1200,213,1320,202.7L1440,192L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="relative bg-white text-black py-20 px-8">
        <h2 class="text-4xl font-black uppercase">Próxima Seção</h2>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 🛠️ HELPER PARA SPLIT TEXT (ANIMAÇÃO POR LETRA) ---
        function splitTextIntoChars(selector) {
            const element = document.querySelector(selector);
            const text = element.innerText;
            element.innerHTML = text.split('').map(char => 
                `<span class="char">${char === ' ' ? '&nbsp;' : char}</span>`
            ).join('');
        }

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                render();
            }});

            // Prepara a tipografia
            splitTextIntoChars('.split-text');
            splitTextIntoChars('.split-text-2');

            const mainTl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 0.8
                }
            });

            // 1. VÍDEO ROLANDO
            mainTl.to(airVideo, { frame: frameCount - 1, snap: "frame", ease: "none", duration: 10 }, 0);

            // 2. ANIMAÇÃO TIPOGRAFIA ATO 1 (ENTRADA)
            mainTl.to("#hero-text-1 .char", {
                opacity: 1,
                filter: "blur(0px)",
                y: 0,
                stagger: 0.05,
                duration: 2,
                ease: "power4.out"
            }, 0.5);
            mainTl.to("#hero-text-1 .sub-text", { opacity: 1, duration: 1 }, 1.5);

            // 3. SAÍDA ATO 1
            mainTl.to("#hero-text-1", { opacity: 0, y: -50, filter: "blur(20px)", duration: 2 }, 4);

            // 4. ENTRADA ATO 2
            mainTl.to("#hero-text-2", { opacity: 1, duration: 0.1 }, 5.5);
            mainTl.to("#hero-text-2 .char", {
                opacity: 1,
                filter: "blur(0px)",
                y: 0,
                stagger: 0.05,
                duration: 2,
                ease: "power4.out"
            }, 5.5);
            mainTl.to("#hero-text-2 .sub-text-2", { opacity: 1, duration: 1 }, 6.5);

            // 5. WAVE MORPH FINAL
            gsap.to("#wave-path", {
                attr: { d: "M0,160L120,144C240,128,480,96,720,96C960,96,1200,128,1320,144L1440,160L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z" },
                scrollTrigger: { trigger: "#scroll-hero", start: "85% top", end: "bottom top", scrub: 1.2 }
            });
        }

        // Preload
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", render);
    </script>
</body>
</html>
