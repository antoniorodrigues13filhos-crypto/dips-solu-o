<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | 3D Cinematic Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
        }
        
        body { background: #0D1B2A; color: white; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px;
            width: 90%; left: 5%;
            z-index: 100;
        }

        /* Container do WebGL */
        #webgl-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0; /* Inicia invisível, aparece no scroll de produtos */
            transition: opacity 1s ease;
        }

        .hero-section { height: 800vh; position: relative; z-index: 2; }
        .product-scroller { height: 300vh; position: relative; z-index: 3; }
        
        .product-label {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-family: 'Outfit';
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-size: 1.5rem;
            color: var(--color-dips-teal);
            text-shadow: 0 0 20px rgba(0, 194, 168, 0.5);
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;justify-content:center;align-items:center;">
        <div style="width:200px;height:2px;background:rgba(255,255,255,0.1);"><div id="progress-bar" style="height:100%;background:#00C2A8;width:0%;"></div></div>
    </div>

    <nav id="navbar" class="fixed top-0 glass-navbar px-8 py-3 flex justify-between items-center shadow-2xl">
        <div class="w-32"></div>
        <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white"></i></div>
    </nav>

    <div id="webgl-container">
        <canvas id="webgl-canvas"></canvas>
        <div id="product-name" class="product-label">Explore Nossas Soluções</div>
    </div>

    <section class="hero-section">
        <div style="position:sticky; top:0; height:100vh; overflow:hidden;">
            <canvas id="hero-canvas" style="width:100%; height:100%;"></canvas>
            <div id="t1" style="position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                <h1 class="text-6xl md:text-9xl font-black uppercase tracking-tighter">O Futuro da <br><span class="text-dips-teal">Energia.</span></h1>
            </div>
        </div>
    </section>

    <section class="product-scroller"></section>

    <script>
        // --- SETUP INICIAL ---
        const heroCanvas = document.getElementById('hero-canvas');
        const heroCtx = heroCanvas.getContext('2d');
        const webglContainer = document.getElementById('webgl-container');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        // --- MOTOR THREE.JS (PRODUTOS 3D) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0D1B2A, 5, 15);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Luzes Cinematográficas
        const light1 = new THREE.PointLight(0x00C2A8, 10); light1.position.set(2, 2, 2); scene.add(light1);
        const light2 = new THREE.PointLight(0xFF6B00, 5); light2.position.set(-2, -2, 2); scene.add(light2);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Carregar Texturas dos Produtos
        const loaderTex = new THREE.TextureLoader();
        const productTexs = [
            'produtos/produto-8942-placa-solar-policristalino-160w.jpg',
            'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png',
            'produtos/MICROINVERSOR 1200W EGT 1200.png'
        ].map(path => loaderTex.load(path));

        const productMeshes = [];
        const productNames = ["Painel Solar 160W", "Controlador PWM", "Microinversor 1.2kW"];

        productTexs.forEach((tex, i) => {
            const geometry = new THREE.PlaneGeometry(2, 2.5);
            const material = new THREE.MeshStandardMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.x = i * 6; // Espaçamento entre produtos
            scene.add(mesh);
            productMeshes.push(mesh);
        });

        // --- LOGICA DE SCROLL ---
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const heroHeight = document.querySelector('.hero-section').offsetHeight;
            const totalWidth = window.innerHeight;

            // Transição entre Video e 3D
            if (scrollPos > heroHeight - totalWidth) {
                webglContainer.style.opacity = "1";
                const productScroll = (scrollPos - heroHeight) / (totalWidth * 2);
                const currentSection = Math.max(0, productScroll);
                
                // Camera Follow Cinematico
                camera.position.x += (currentSection * 6 - camera.position.x) * 0.05;
                
                // Update Nome
                const sectionIdx = Math.round(currentSection);
                document.getElementById('product-name').innerText = productNames[sectionIdx] || productNames[2];
            } else {
                webglContainer.style.opacity = "0";
            }

            // Video Frames
            const heroPercent = Math.min(1, scrollPos / (heroHeight - window.innerHeight));
            const frameIdx = Math.min(frameCount - 1, Math.floor(heroPercent * (frameCount - 1)));
            if (images[frameIdx]) drawHero(images[frameIdx]);
        });

        function drawHero(img) {
            heroCanvas.width = window.innerWidth;
            heroCanvas.height = window.innerHeight;
            const ratio = Math.max(heroCanvas.width / img.width, heroCanvas.height / img.height);
            const w = img.width * ratio; const h = img.height * ratio;
            heroCtx.clearRect(0,0, heroCanvas.width, heroCanvas.height);
            heroCtx.drawImage(img, (heroCanvas.width - w)/2, (heroCanvas.height - h)/2, w, h);
        }

        function animate() {
            requestAnimationFrame(animate);
            productMeshes.forEach(m => {
                m.rotation.y = Math.sin(Date.now() * 0.001) * 0.1; // Balanço suave
            });
            renderer.render(scene, camera);
        }

        // --- CARREGAMENTO ---
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                document.getElementById('progress-bar').style.width = (loaded/frameCount*100) + "%";
                if(loaded === frameCount) {
                    document.getElementById('loader').style.display = 'none';
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        lucide.createIcons();
    </script>
</body>
</html>
