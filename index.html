<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | High Performance Mobile</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }

        body { 
            background-color: #0D1B2A; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            color: white;
            /* Melhora o scroll no iOS */
            -webkit-overflow-scrolling: touch;
        }
        .text-glow { text-shadow: 0 0 20px rgba(0, 194, 168, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        canvas { 
            filter: saturate(1.1) contrast(1.1) brightness(0.9);
            will-change: transform;
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <img src="logo/LOGO.png" alt="Dips" class="h-10 mb-8 opacity-50">
        <div class="w-32 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0"></div>
        </div>
    </div>

    <header class="fixed top-0 left-0 w-full z-[100] p-6 md:p-8 flex justify-between items-center pointer-events-none">
        <img src="logo/LOGO.png" alt="Dips" class="h-10 md:h-16 pointer-events-auto filter drop-shadow-xl">
        <div class="flex gap-2 items-center text-[8px] md:text-[10px] tracking-[0.4em] uppercase font-bold text-white/50">
            <span class="hidden sm:inline">System Active</span>
            <span class="w-2 h-2 bg-intel-green-light rounded-full"></span>
        </div>
    </header>

    <section id="scroll-hero" style="height:700vh; position:relative;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas"></canvas>
            
            <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(13,27,42,1) 0%, rgba(13,27,42,0.4) 45%, transparent 100%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:flex-end; padding:8vh 6vw;">
                <div id="hero-text-container" class="relative w-full max-w-5xl mx-auto">
                    
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full opacity-0 translate-y-8">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="w-6 h-[1px] bg-intel-orange block"></span>
                            <span class="uppercase tracking-widest text-[10px] font-bold text-intel-orange">High Performance</span>
                        </div>
                        <h1 class="font-display text-4xl md:text-7xl lg:text-8xl font-black leading-[0.9] tracking-tight uppercase text-intel-white text-glow">
                            O Futuro da <br/> <span class="text-intel-green-light">Energia.</span>
                        </h1>
                        <p class="mt-4 text-sm md:text-xl max-w-md text-intel-white/60">
                            Hardware revolucionário projetado para eficiência máxima.
                        </p>
                    </div>

                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0 translate-y-8">
                        <h2 class="font-display text-3xl md:text-6xl font-black leading-tight tracking-tight uppercase">
                            Tecnologia <br/> <span class="text-intel-orange">Modular.</span>
                        </h2>
                        <div class="mt-6 flex flex-col md:flex-row gap-4">
                            <div class="flex items-center gap-3 glass-panel p-3 rounded-lg">
                                <i data-lucide="cpu" class="w-4 h-4 text-intel-green-light"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest">Controle PWM</p>
                            </div>
                            <div class="flex items-center gap-3 glass-panel p-3 rounded-lg">
                                <i data-lucide="zap" class="w-4 h-4 text-intel-orange"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest">Inversor 1200W</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-24 px-6 bg-intel-black z-10 text-center">
        <h2 class="font-display text-3xl md:text-6xl font-bold uppercase text-intel-white">
            Sistema <span class="text-intel-orange">Sincronizado</span>
        </h2>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        lucide.createIcons();

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d", { alpha: false });
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        // Otimização Mobile: Reduz qualidade de renderização se for celular
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const dpr = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2);

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        function sizeCanvas() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            render();
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
            }});

            sizeCanvas();

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: isMobile ? 0.8 : 1.2, // Scrub mais rápido no mobile para evitar lag
                    invalidateOnRefresh: true
                }
            });

            tl.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                duration: 10,
                onUpdate: render
            }, 0);

            tl.to("#hero-text-1", { opacity: 1, y: 0, duration: 2 }, 0.5);
            tl.to("#hero-text-1", { opacity: 0, y: -30, filter: "blur(10px)", duration: 2 }, 4);
            tl.to("#hero-text-2", { opacity: 1, y: 0, duration: 2 }, 5.5);
        }

        // Preload leve
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        let resizeTimeout;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(sizeCanvas, 200);
        });
    </script>
</body>
</html>
