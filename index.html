<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | O Futuro da Energia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            /* PALETA DE CORES ATUALIZADA DA REFERÊNCIA */
            --color-dips-navy: #0D1B2A;       /* Azul Escuro Profundo */
            --color-dips-blue-dark: #1B3A5B;  /* Azul Marinho Secundário */
            --color-dips-teal: #00C2A8;       /* Teal Vibrante (Glow e Destaque) */
            --color-dips-orange: #FF6B00;     /* Laranja (CTA Primário) */
            --color-dips-white: #FFFFFF;      /* Texto principal e Navbar */
            --color-dips-grey: #B0BEC5;       /* Texto secundário */
            
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-dips-navy);
            color: var(--color-dips-white);
            overflow: hidden; 
        }

        h1, h2, h3, h4, h5, .font-display { font-family: var(--font-display); }

        .glass-panel {
            background: rgba(27, 58, 91, 0.4); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 194, 168, 0.1); 
        }

        .text-glow { 
            text-shadow: 0 0 20px rgba(0, 194, 168, 0.4); 
        }

        /* ESTILO DO BOTÃO CTA DA REFERÊNCIA (ORANGE TO TEAL) */
        .cta-button {
            background: linear-gradient(90deg, var(--color-dips-orange) 0%, var(--color-dips-teal) 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.2);
        }
        
        .cta-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 194, 168, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-dips-navy); }
        ::-webkit-scrollbar-thumb { background: var(--color-dips-blue-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-dips-teal); }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:var(--color-dips-navy);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <i data-lucide="sun" class="w-16 h-16 text-dips-teal mb-4 animate-pulse"></i>
        <h2 class="text-3xl font-display font-bold text-dips-white mb-2 tracking-tight uppercase">Sistema Solar</h2>
        <div style="width:16rem;height:0.5rem;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:var(--color-dips-teal);transition:all 100ms ease-out;width:0%;"></div>
        </div>
        <p id="loading-text" class="text-dips-grey mt-2 text-sm font-medium uppercase tracking-widest">Sincronizando Módulos 0%...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white shadow-md px-8 py-4 flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto flex items-center gap-2">
            <img src="logo/LOGO.png" alt="Dips Logo" class="h-10 w-auto object-contain">
        </div>
        <button class="pointer-events-auto flex gap-3 items-center text-sm uppercase tracking-widest font-bold text-dips-navy hover:text-dips-teal transition-colors">
            Menu <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </nav>

    <section id="scroll-hero" style="height:500vh;position:relative;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0D1B2A 0%, rgba(13, 27, 42, 0.5) 50%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-center px-6;">
                <div id="hero-text-container" class="relative w-full max-w-6xl mx-auto flex flex-col items-center justify-center text-center">
                    
                    <div id="hero-text-1" class="w-full flex flex-col items-center justify-center transition-all duration-300">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="w-12 h-[2px] bg-dips-teal block"></span>
                            <span class="uppercase tracking-widest text-base font-bold text-dips-teal">Dips solutioms</span>
                            <span class="w-12 h-[2px] bg-dips-teal block"></span>
                        </div>
                        <h1 class="font-display text-7xl md:text-9xl font-extrabold leading-[0.85] uppercase text-dips-white text-glow mb-2">
                            O Futuro da
                        </h1>
                        <h1 class="font-display text-7xl md:text-9xl font-extrabold leading-[0.85] uppercase text-dips-teal text-glow mb-6">
                            Energia.
                        </h1>
                        <p class="mt-4 text-xl md:text-2xl max-w-2xl text-dips-grey uppercase tracking-wider font-medium">
                            Soluções técnicas e serviços em distribuição de energia.
                        </p>
                        
                        <div class="mt-12">
                            <button class="cta-button px-12 py-5 rounded-full font-bold uppercase tracking-widest text-white text-sm">
                                Veja Nossas Soluções
                            </button>
                        </div>
                    </div>

                    <div id="hero-text-2" class="absolute inset-0 w-full flex flex-col items-center justify-center opacity-0 translate-y-12 transition-all duration-300">
                        <h2 class="font-display text-5xl md:text-7xl font-bold uppercase tracking-tight text-dips-white">
                            Três Tecnologias. <br/> <span class="text-dips-orange">Um Ecossistema.</span>
                        </h2>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="relative py-32 px-6 bg-dips-navy z-10 border-t border-white/5">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
            <div class="p-8 glass-panel rounded-2xl">
                <i data-lucide="sun" class="w-10 h-10 text-dips-teal mx-auto mb-6"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-dips-white">Captação Solar</h3>
            </div>
            <div class="p-8 glass-panel rounded-2xl">
                <i data-lucide="cpu" class="w-10 h-10 text-dips-teal mx-auto mb-6"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-dips-white">Gerenciamento</h3>
            </div>
            <div class="p-8 glass-panel rounded-2xl">
                <i data-lucide="refresh-cw" class="w-10 h-10 text-dips-teal mx-auto mb-6"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-dips-white">Distribuição</h3>
            </div>
        </div>
    </section>

    <script>
        function initLucide() { window.lucide && lucide.createIcons(); }
        initLucide();

        const frameCount = 176; 
        const images = [];
        let loadedImages = 0;
        
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');
        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const heroEl = document.getElementById('scroll-hero');
        const text1 = document.getElementById('hero-text-1');
        const text2 = document.getElementById('hero-text-2');

        const baseUrl = "/frame/ezgif-frame-"; 

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderCurrentFrame();
        }

        function renderCurrentFrame() {
            const maxScroll = heroEl.offsetHeight - window.innerHeight;
            const fraction = Math.max(0, Math.min(1, window.scrollY / maxScroll));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * (frameCount - 1)));
            
            if (images[frameIndex] && images[frameIndex].complete) {
                drawCover(images[frameIndex]);
            }
        }

        function drawCover(img) {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let rw, rh, ox, oy;
            if (canvasRatio > imgRatio) {
                rw = canvas.width; rh = img.height * (canvas.width / img.width);
                ox = 0; oy = (canvas.height - rh) / 2;
            } else {
                rh = canvas.height; rw = img.width * (canvas.height / img.height);
                ox = (canvas.width - rw) / 2; oy = 0;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, ox, oy, rw, rh);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            const frameNum = i.toString().padStart(3, '0');
            img.src = `${baseUrl}${frameNum}.jpg`;
            img.onload = () => {
                loadedImages++;
                const p = Math.floor((loadedImages / frameCount) * 100);
                progressBar.style.width = p + "%";
                loadingText.innerText = "Sincronizando Hardware " + p + "%...";
                if (loadedImages === frameCount) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        loader.style.visibility = 'hidden';
                        document.body.style.overflow = 'auto';
                        updateCanvasSize();
                    }, 500);
                }
            };
            images[i - 1] = img;
        }

        window.addEventListener('resize', updateCanvasSize);
        window.addEventListener('scroll', () => {
            requestAnimationFrame(() => {
                renderCurrentFrame();
                const max = heroEl.offsetHeight - window.innerHeight;
                const f = window.scrollY / max;
                if(text1) text1.style.opacity = f > 0.3 ? 0 : 1;
                if(text2) {
                    text2.style.opacity = (f > 0.35 && f < 0.8) ? 1 : 0;
                    text2.style.transform = f > 0.35 ? 'translateY(0)' : 'translateY(48px)';
                }
            });
        }, { passive: true });
    </script>
</body>
</html>
