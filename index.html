<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPS | Ultra Cinematic</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme { --color-dips-teal: #00C2A8; }
        body { background: #000; color: #fff; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }
        
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        #hero-canvas { z-index: 10; }
        #webgl-canvas { z-index: 5; opacity: 0; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] md:w-[60%] glass-nav px-8 py-4 flex justify-between items-center z-[200]">
        <img src="logo/LOGO.png" alt="DIPS" class="h-8 md:h-12 object-contain">
        <div class="flex gap-4 items-center uppercase text-[10px] tracking-[0.3em] font-bold">
            <span class="text-dips-teal">Hardware</span>
            <i data-lucide="menu"></i>
        </div>
    </nav>

    <div id="scroller" class="h-[1500vh]">
        <canvas id="hero-canvas"></canvas>
        <canvas id="webgl-canvas"></canvas>

        <div class="fixed inset-0 flex items-center justify-center z-50 pointer-events-none text-center">
            <div id="h-txt" class="opacity-0">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter">O FUTURO</h1>
                <h1 class="text-dips-teal text-7xl md:text-9xl font-black uppercase tracking-tighter">ENERGIA.</h1>
            </div>
        </div>

        <div id="p-info" class="fixed bottom-20 w-full text-center z-50 opacity-0 pointer-events-none">
            <h2 id="p-title" class="text-4xl md:text-6xl font-black uppercase font-display tracking-tight">PRODUTO</h2>
            <p id="p-desc" class="text-dips-teal uppercase tracking-[0.5em] text-xs font-bold mt-2">DIPS ULTRA SERIES</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 1. ENGINE & SHADER SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15);
        
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        // --- 🌀 2. POST-PROCESSING (BLUR & BLOOM REAL) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.21;
        bloomCount.strength = 1.2;
        bloomPass.radius = 0.55;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 🧊 3. LAYERS AVANÇADOS ---
        const productData = [
            { name: "PAINEL HP 160W", desc: "ULTRA EFICIÊNCIA", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "CONTROLADOR PWM", desc: "SMART MANAGEMENT", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "MICROINVERSOR", desc: "PRO CONVERSION", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((data, i) => {
            const geometry = new THREE.PlaneGeometry(3.5, 4.5);
            // Shader de Material Premium
            const material = new THREE.MeshStandardMaterial({ 
                map: texLoader.load(data.img), 
                transparent: true, 
                metalness: 0.9, 
                roughness: 0.1,
                emissive: new THREE.Color(0x00C2A8),
                emissiveIntensity: 0.05
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.y = -i * 15;
            scene.add(mesh);
            meshes.push(mesh);
        });

        // Luzes Dinâmicas
        const topLight = new THREE.DirectionalLight(0xffffff, 2);
        topLight.position.set(0, 10, 10);
        scene.add(topLight);

        // --- 🎥 4. HERO VIDEO SETUP ---
        const heroCanvas = document.getElementById('hero-canvas');
        const ctx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        function drawFrame(idx) {
            if (!images[idx]) return;
            heroCanvas.width = window.innerWidth; heroCanvas.height = window.innerHeight;
            const img = images[idx];
            const ratio = Math.max(heroCanvas.width/img.width, heroCanvas.height/img.height);
            ctx.drawImage(img, (heroCanvas.width-img.width*ratio)/2, (heroCanvas.height-img.height*ratio)/2, img.width*ratio, img.height*ratio);
        }

        // --- ⚡ 5. CINEMATIC TIMELINE ---
        const tl = gsap.timeline({
            scrollTrigger: { trigger: "#scroller", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });

        let frameObj = { frame: 0 };
        tl.to(frameObj, {
            frame: frameCount-1, duration: 4, ease: "none",
            onUpdate: () => drawFrame(Math.floor(frameObj.frame))
        }, 0);

        tl.to("#h-txt", { opacity: 1, y: -40, duration: 1 }, 0.5);
        tl.to("#h-txt", { opacity: 0, scale: 2.5, filter: "blur(20px)", duration: 1 }, 2);

        // Transição Morph (Video -> 3D)
        tl.to("#hero-canvas", { scale: 4, filter: "blur(40px)", opacity: 0, duration: 2 }, 3.5);
        tl.to("#webgl-canvas", { opacity: 1, duration: 1 }, 4.2);

        // Camera Path Cinematográfico (Dolly In/Out)
        productData.forEach((p, i) => {
            tl.to(camera.position, {
                y: meshes[i].position.y,
                z: 7,
                duration: 3,
                ease: "expo.inOut",
                onStart: () => {
                    gsap.to("#p-info", { opacity: 1, y: 0 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 5 + (i * 3));
        });

        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => {
                m.rotation.y = Math.sin(Date.now() * 0.0008) * 0.2;
                m.rotation.x = Math.cos(Date.now() * 0.0005) * 0.1;
            });
            composer.render(); // Renderiza com Post-Processing
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                if (loaded === frameCount) {
                    drawFrame(0);
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
