<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPS | High-End Cinematic Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme { --color-dips-teal: #00C2A8; --color-dips-orange: #FF6B00; }
        body { background-color: #000; color: white; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }
        
        /* 🫥 INTRO CROSS DISSOLVE */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
        }

        #main-scroller { height: 1500vh; position: relative; }

        .viewport-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; will-change: transform, filter;
        }

        #hero-canvas { z-index: 2; object-fit: cover; }
        #webgl-canvas { z-index: 1; }

        /* 🌀 PARALLAX LAYER TRANSITION */
        .parallax-text {
            position: absolute; font-size: 15vw; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); white-space: nowrap;
            z-index: 5; pointer-events: none; font-family: 'Outfit';
        }
    </style>
</head>
<body class="antialiased">

    <div id="intro-overlay">
        <img src="logo/LOGO.png" alt="Dips" class="h-20 animate-pulse opacity-50">
    </div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 py-3 flex justify-between items-center opacity-0 transition-opacity duration-1000">
        <div class="w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-12 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white"></i></div>
    </nav>

    <div id="main-scroller">
        <div class="parallax-text" id="p-layer-1" style="top: 20%; left: -20%;">INNOVATION</div>
        <div class="parallax-text" id="p-layer-2" style="bottom: 20%; right: -20%;">HARDWARE</div>

        <div class="viewport-container"><canvas id="hero-canvas"></canvas></div>
        <div class="viewport-container"><canvas id="webgl-canvas"></canvas></div>

        <div class="fixed inset-0 flex flex-col justify-center items-center z-10 pointer-events-none text-center">
            <div id="hero-txt" class="opacity-0">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter font-display">THE FUTURE</h1>
                <h1 class="text-7xl md:text-9xl font-black text-dips-teal tracking-tighter uppercase font-display">ENERGY.</h1>
            </div>
            <div id="prod-txt" class="absolute bottom-20 opacity-0">
                <h2 id="p-title" class="text-4xl md:text-6xl font-black uppercase font-display">PRODUTO</h2>
                <p id="p-desc" class="text-dips-teal uppercase tracking-[0.4em] font-bold text-xs mt-2">DIPS PREMIUM</p>
            </div>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 1. WORLD SETUP (THREE.JS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // --- 🌀 PARALLAX LAYER DATA ---
        const heroCanvas = document.getElementById('hero-canvas');
        const ctx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        // --- 🧊 3. MATERIAL SHADER MORPH (SIMULADO VIA GSAP/MESH) ---
        const productData = [
            { name: "Painel HP 160W", desc: "Captação de Ultra Eficiência", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão de Carga Inteligente", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão de Alta Fidelidade", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((d, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 4),
                new THREE.MeshStandardMaterial({ map: texLoader.load(d.img), transparent: true, metalness: 0.7, roughness: 0.2 })
            );
            mesh.position.y = -i * 12;
            scene.add(mesh);
            meshes.push(mesh);
        });
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- ⚡ 4. GLSL DISTORTION TRANSITION LOGIC ---
        function applyDistortion(scroll) {
            // No ponto de transição, aplicamos um leve blur/zoom no canvas 2D
            if (scroll > 0.35 && scroll < 0.5) {
                const dist = (scroll - 0.35) * 20;
                heroCanvas.style.filter = `blur(${dist}px) brightness(${1 - dist/10})`;
                heroCanvas.style.transform = `scale(${1 + dist/50})`;
            } else if (scroll >= 0.5) {
                heroCanvas.style.opacity = "0";
            } else {
                heroCanvas.style.opacity = "1";
                heroCanvas.style.filter = "none";
                heroCanvas.style.transform = "scale(1)";
            }
        }

        // --- 🎥 2. WORLD TRANSITION SCROLL-DRIVEN CAMERA LERP ---
        const mainTl = gsap.timeline({
            scrollTrigger: { trigger: "#main-scroller", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });

        // Camera Path & World Transition
        let frameObj = { val: 0 };
        mainTl.to(frameObj, {
            val: frameCount - 1, duration: 4, ease: "none",
            onUpdate: () => {
                const idx = Math.floor(frameObj.val);
                if (images[idx]) {
                    heroCanvas.width = window.innerWidth; heroCanvas.height = window.innerHeight;
                    const ratio = Math.max(heroCanvas.width / images[idx].width, heroCanvas.height / images[idx].height);
                    const w = images[idx].width * ratio; const h = images[idx].height * ratio;
                    ctx.clearRect(0,0, heroCanvas.width, heroCanvas.height);
                    ctx.drawImage(images[idx], (heroCanvas.width-w)/2, (heroCanvas.height-h)/2, w, h);
                }
                applyDistortion(mainTl.progress());
            }
        }, 0);

        // 🎯 Camera Lerp / Path
        mainTl.to("#hero-txt", { opacity: 1, y: -20, duration: 1 }, 0.5);
        mainTl.to("#hero-txt", { opacity: 0, scale: 1.5, duration: 1 }, 2);

        // 🌀 Parallax Layers Transition
        mainTl.to("#p-layer-1", { x: 500, duration: 5 }, 0);
        mainTl.to("#p-layer-2", { x: -500, duration: 5 }, 0);

        // 🧊 Product Morph/Camera Morph
        productData.forEach((p, i) => {
            mainTl.to(camera.position, {
                y: meshes[i].position.y, z: 6, duration: 3, ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#prod-txt", { opacity: 1, duration: 0.5 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 4 + (i * 3));
        });

        // Loop de Renderização 3D
        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => { m.rotation.y = Math.sin(Date.now() * 0.001) * 0.1; });
            renderer.render(scene, camera);
        }

        // Loader & Intro Morph
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                if (loaded === frameCount) {
                    setTimeout(() => {
                        document.getElementById('intro-overlay').style.opacity = '0';
                        document.getElementById('navbar').style.opacity = '1';
                        setTimeout(() => { 
                            document.getElementById('intro-overlay').style.display = 'none';
                            animate(); 
                        }, 2000);
                    }, 500);
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
