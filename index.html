<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Cinematic Energy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
        }
        body { background-color: #000; color: white; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }
        
        /* 🫥 INTRO CROSSFADE LAYER */
        #intro-overlay {
            position: fixed; inset: 0;
            background: #000;
            z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
        }

        #main-scroller { height: 1200vh; position: relative; opacity: 0; transition: opacity 2.5s ease; }

        .canvas-container {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        #hero-canvas { z-index: 2; object-fit: cover; filter: brightness(0.8); }
        #webgl-canvas { z-index: 1; opacity: 0; }

        .overlay-content {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
            text-align: center;
        }

        .text-glow { text-shadow: 0 0 40px rgba(0, 194, 168, 0.7); }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div id="intro-content" class="text-center">
            <h2 class="font-display text-dips-teal tracking-[0.5em] text-xs mb-4 uppercase animate-pulse">Sincronizando Hardware</h2>
            <img src="logo/LOGO.png" alt="Dips" class="h-16 md:h-24 object-contain opacity-50">
        </div>
        <div style="width:12rem; height:1px; background:rgba(255,255,255,0.1); margin-top: 40px; overflow:hidden;">
            <div id="progress-bar" style="height:100%; background:var(--color-dips-teal); width:0%; transition: width 0.3s;"></div>
        </div>
    </div>

    <nav class="fixed top-0 z-50 glass-navbar px-8 py-3 flex justify-between items-center opacity-0" id="nav-ui">
        <div class="w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white cursor-pointer"></i></div>
    </nav>

    <div id="main-scroller">
        <div class="canvas-container"><canvas id="hero-canvas"></canvas></div>
        <div class="canvas-container"><canvas id="webgl-canvas"></canvas></div>

        <div class="overlay-content">
            <div id="t1" class="opacity-0 translate-y-10">
                <h1 class="text-6xl md:text-9xl font-black tracking-tighter uppercase font-display">O FUTURO DA</h1>
                <h1 class="text-6xl md:text-9xl font-black text-dips-teal text-glow tracking-tighter uppercase font-display">ENERGIA.</h1>
            </div>
            <div id="t2" class="absolute opacity-0 translate-y-10">
                <h1 class="text-5xl md:text-8xl font-black tracking-tighter uppercase font-display">TECNOLOGIA</h1>
                <h1 class="text-5xl md:text-8xl font-black text-white tracking-tighter uppercase font-display">MODULAR.</h1>
            </div>
        </div>

        <div class="overlay-content" id="product-info" style="justify-content: flex-end; padding-bottom: 12vh; opacity: 0;">
            <h2 id="p-title" class="text-4xl md:text-6xl font-black uppercase font-display">PRODUTO</h2>
            <p id="p-desc" class="text-dips-teal uppercase tracking-[0.4em] text-xs mt-4 font-bold">ALTA PERFORMANCE</p>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const heroCanvas = document.getElementById('hero-canvas');
        const heroCtx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loadedCount = 0;

        // 🧊 Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.z = 8;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const spot = new THREE.SpotLight(0x00C2A8, 80); spot.position.set(5, 5, 5); scene.add(spot);

        const productData = [
            { name: "Painel HP 160W", desc: "Captação Ultra Eficiente", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão Inteligente", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão Profissional", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((data, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 4),
                new THREE.MeshStandardMaterial({ map: texLoader.load(data.img), transparent: true, metalness: 0.6, roughness: 0.2 })
            );
            mesh.position.y = -i * 12;
            scene.add(mesh);
            meshes.push(mesh);
        });

        function drawFrame(idx) {
            if (!images[idx]) return;
            heroCanvas.width = window.innerWidth;
            heroCanvas.height = window.innerHeight;
            const img = images[idx];
            const ratio = Math.max(heroCanvas.width / img.width, heroCanvas.height / img.height);
            const w = img.width * ratio; const h = img.height * ratio;
            heroCtx.clearRect(0,0, heroCanvas.width, heroCanvas.height);
            heroCtx.drawImage(img, (heroCanvas.width - w)/2, (heroCanvas.height - h)/2, w, h);
        }

        // --- MASTER TIMELINE ---
        const masterTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#main-scroller", start: "top top", end: "bottom bottom", scrub: 1.5
            }
        });

        let frameObj = { frame: 0 };
        masterTl.to(frameObj, {
            frame: frameCount - 1, duration: 4, ease: "none",
            onUpdate: () => drawFrame(Math.floor(frameObj.frame))
        }, 0);

        masterTl.to("#t1", { opacity: 1, y: 0, duration: 1 }, 0.5);
        masterTl.to("#t1", { opacity: 0, y: -40, duration: 1 }, 2);
        masterTl.to("#t2", { opacity: 1, y: 0, duration: 1 }, 2.5);
        masterTl.to("#t2", { opacity: 0, y: -40, duration: 1 }, 3.5);

        // Transição Crossfade do Vídeo p/ 3D
        masterTl.to("#hero-canvas", { opacity: 0, duration: 1.5, ease: "power2.inOut" }, 3.8);
        masterTl.to("#webgl-canvas", { opacity: 1, duration: 1.5 }, 3.8);

        productData.forEach((p, i) => {
            masterTl.to(camera.position, {
                y: meshes[i].position.y, duration: 3, ease: "expo.inOut",
                onStart: () => {
                    gsap.to("#product-info", { opacity: 1, duration: 0.5 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 4 + (i * 3));
        });

        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => m.rotation.y = Math.sin(Date.now()*0.001)*0.15);
            renderer.render(scene, camera);
        }

        // --- INICIALIZAÇÃO COM CROSS DISSOLVE ---
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loadedCount++;
                document.getElementById('progress-bar').style.width = (loadedCount/frameCount*100) + "%";
                if(loadedCount === frameCount) {
                    // 🫥 EXECUTA O CROSS DISSOLVE
                    setTimeout(() => {
                        document.getElementById('intro-overlay').style.opacity = '0';
                        document.getElementById('main-scroller').style.opacity = '1';
                        document.getElementById('nav-ui').style.opacity = '1';
                        
                        setTimeout(() => {
                            document.getElementById('intro-overlay').style.display = 'none';
                            drawFrame(0);
                            animate();
                        }, 2000);
                    }, 500);
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            drawFrame(Math.floor(frameObj.frame));
        });

        lucide.createIcons();
    </script>
</body>
</html>
