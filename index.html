<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Soluções em Distribuição</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
            --font-display: 'Outfit', sans-serif;
        }
        
        body { 
            background-color: #0D1B2A; 
            color: white; 
            overflow: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        /* NAVBAR PREMIUM ARREDONDADA (PILULA) */
        .glass-navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px;
            width: 90%;
            left: 5%;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.6); }
        
        .cta-button { 
            background: linear-gradient(90deg, #FF6B00 0%, #00C2A8 100%); 
            transition: all 0.3s ease; 
        }
        
        .cta-button:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 25px rgba(0, 194, 168, 0.4);
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s;">
        <div style="width:16rem;height:4px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:#00C2A8;width:0%;"></div>
        </div>
    </div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 md:px-12 py-3 flex justify-between items-center shadow-2xl">
        <div class="hidden md:block w-32"></div> 

        <div class="flex items-center justify-center flex-1">
            <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        </div>
        
        <div class="flex items-center justify-end w-32">
            <button class="flex gap-3 items-center text-xs font-black text-white uppercase tracking-[0.2em] hover:text-dips-teal transition-colors group">
                <span class="hidden md:inline">Menu</span>
                <div class="flex flex-col gap-1">
                    <span class="w-6 h-[2px] bg-white group-hover:bg-dips-teal transition-all"></span>
                    <span class="w-4 h-[2px] bg-dips-teal self-end"></span>
                </div>
            </button>
        </div>
    </nav>

    <section id="scroll-hero" style="height:800vh; position:relative;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%;"></canvas>
            
            <div style="position:absolute; inset:0; background:linear-gradient(to top, #0D1B2A 0%, rgba(13,27,42,0.4) 50%, transparent 100%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding-top: 80px;">
                
                <div id="t1" class="absolute transition-all duration-500">
                    <h1 class="font-display text-5xl md:text-8xl lg:text-9xl uppercase leading-none mb-4">O FUTURO DA</h1>
                    <h1 class="font-display text-5xl md:text-8xl lg:text-9xl uppercase leading-none text-dips-teal text-glow">ENERGIA.</h1>
                    <p class="mt-6 text-gray-400 uppercase tracking-widest font-bold">Distribuição e Soluções Técnicas</p>
                </div>

                <div id="t2" class="absolute opacity-0 translate-y-10 transition-all duration-500">
                    <h2 class="font-display text-4xl md:text-7xl uppercase mb-4">TECNOLOGIA</h2>
                    <h2 class="font-display text-4xl md:text-7xl uppercase text-dips-orange">MODULAR.</h2>
                    <p class="mt-6 text-gray-400 uppercase tracking-widest font-bold max-w-xl">Gerenciamento inteligente para sistemas de alta performance.</p>
                </div>

                <div id="t3" class="absolute opacity-0 translate-y-10 transition-all duration-500">
                    <h2 class="font-display text-4xl md:text-7xl uppercase mb-8 text-glow">DIPS SOLUTION</h2>
                    <button class="cta-button px-12 py-5 rounded-full font-bold uppercase tracking-widest shadow-2xl text-white">Veja Nossas Soluções</button>
                </div>

            </div>
        </div>
    </section>

    <script>
        function initLucide() { window.lucide && lucide.createIcons(); }
        initLucide();

        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const navbar = document.getElementById('navbar');
        const frameCount = 71; 
        const images = [];
        let loadedImages = 0;

        const txt1 = document.getElementById('t1');
        const txt2 = document.getElementById('t2');
        const txt3 = document.getElementById('t3');

        function drawImage(img) {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let nw, nh, nx, ny;
            if (canvasRatio > imgRatio) {
                nw = canvas.width; nh = img.height * (canvas.width / img.width);
                nx = 0; ny = (canvas.height - nh) / 2;
            } else {
                nh = canvas.height; nw = img.width * (canvas.height / img.height);
                nx = (canvas.width - nw) / 2; ny = 0;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, nx, ny, nw, nh);
        }

        function handleScroll() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scroll = window.scrollY / (document.getElementById('scroll-hero').offsetHeight - window.innerHeight);
            
            // Efeito Parallax na Navbar
            const navMove = Math.min(15, scroll * 60); 
            navbar.style.transform = `translateY(${-navMove}px) scale(${1 - (scroll * 0.02)})`;

            const idx = Math.min(frameCount - 1, Math.floor(scroll * (frameCount - 1)));
            if (images[idx]) drawImage(images[idx]);

            txt1.style.opacity = scroll < 0.25 ? 1 : 0;
            txt1.style.transform = scroll < 0.25 ? "translateY(0)" : "translateY(-50px)";

            const inT2 = scroll > 0.35 && scroll < 0.65;
            txt2.style.opacity = inT2 ? 1 : 0;
            txt2.style.transform = inT2 ? "translateY(0)" : "translateY(20px)";

            const inT3 = scroll > 0.75;
            txt3.style.opacity = inT3 ? 1 : 0;
            txt3.style.transform = inT3 ? "translateY(0)" : "translateY(20px)";
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = (loadedImages/frameCount*100) + "%";
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => { 
                        document.getElementById('loader').style.visibility = 'hidden';
                        document.body.style.overflow = 'auto';
                    }, 500);
                    handleScroll();
                }
            };
            images.push(img);
        }

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
    </script>
</body>
</html>
