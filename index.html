<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPS | Premium UIX Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-teal: #00C2A8;
            --color-dips-navy: #0D1B2A;
            --color-dips-blue-dark: #1B263B;
        }
        
        body { 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        /* NAVBAR GLASS */
        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
        }

        #main-scroller { height: 1600vh; position: relative; }

        .viewport-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
        }

        #hero-canvas { z-index: 2; object-fit: cover; }
        
        /* NOVO FUNDO DE PRODUTOS (REMOVIDO O PRETO) */
        #products-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            z-index: 0; opacity: 0; transition: opacity 1s ease;
        }

        /* UIX CARDS GLASSMORPHISM */
        .uix-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: border-color 0.5s ease;
        }

        .uix-card:hover {
            border-color: var(--color-dips-teal);
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.4); }
    </style>
</head>
<body class="antialiased">

    <div id="products-bg"></div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 py-3 flex justify-between items-center opacity-0 transition-opacity duration-1000">
        <div class="w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-12 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white"></i></div>
    </nav>

    <div id="main-scroller">
        <div class="viewport-container"><canvas id="hero-canvas"></canvas></div>
        
        <div class="viewport-container"><canvas id="webgl-canvas"></canvas></div>

        <div class="fixed inset-0 flex flex-col justify-center items-center z-10 pointer-events-none">
            
            <div id="hero-txt" class="opacity-0 text-center">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter font-display">THE FUTURE</h1>
                <h1 class="text-7xl md:text-9xl font-black text-dips-teal tracking-tighter uppercase font-display text-glow">ENERGY.</h1>
            </div>

            <div id="uix-container" class="opacity-0 translate-y-20 w-full max-w-lg px-6">
                <div class="uix-card">
                    <div id="card-content" class="w-full">
                        <h2 id="p-title" class="text-3xl md:text-5xl font-black uppercase font-display mb-4">PRODUTO</h2>
                        <div class="h-[1px] w-12 bg-dips-teal mx-auto mb-6"></div>
                        <p id="p-desc" class="text-gray-400 text-sm md:text-base leading-relaxed font-light mb-8">Descrição técnica de alta performance.</p>
                        <button class="bg-white text-dips-navy px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-dips-teal hover:text-white transition-all">
                            Ver Detalhes
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 8;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // Luzes Premium
        const light = new THREE.SpotLight(0x00C2A8, 50); light.position.set(5, 5, 5); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Dados
        const productData = [
            { name: "Painel HP 160W", desc: "Módulo monocristalino de ultra eficiência projetado para máxima captação sob condições extremas.", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão inteligente de carga com proteção total contra surtos e otimização de vida útil das baterias.", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão de energia DC/AC de alta fidelidade com monitoramento individual por módulo.", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((d, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 3),
                new THREE.MeshStandardMaterial({ map: texLoader.load(d.img), transparent: true, metalness: 0.5, roughness: 0.3 })
            );
            mesh.position.y = -i * 12;
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- HERO CANVAS ---
        const heroCanvas = document.getElementById('hero-canvas');
        const ctx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        // --- GSAP TIMELINE ---
        const tl = gsap.timeline({
            scrollTrigger: { trigger: "#main-scroller", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });

        // 1. Video Frames
        let frameObj = { val: 0 };
        tl.to(frameObj, {
            val: frameCount - 1, duration: 4, ease: "none",
            onUpdate: () => {
                const idx = Math.floor(frameObj.val);
                if (images[idx]) {
                    heroCanvas.width = window.innerWidth; heroCanvas.height = window.innerHeight;
                    const ratio = Math.max(heroCanvas.width / images[idx].width, heroCanvas.height / images[idx].height);
                    const w = images[idx].width * ratio; const h = images[idx].height * ratio;
                    ctx.drawImage(images[idx], (heroCanvas.width-w)/2, (heroCanvas.height-h)/2, w, h);
                }
            }
        }, 0);

        // 2. Hero Text Animation
        tl.to("#hero-txt", { opacity: 1, y: -20, duration: 1 }, 0.5);
        tl.to("#hero-txt", { opacity: 0, scale: 1.2, duration: 1 }, 2);

        // 3. Transição UIX: Fundo Navy + Desfoque do Vídeo
        tl.to("#hero-canvas", { opacity: 0, duration: 1.5 }, 3.5);
        tl.to("#products-bg", { opacity: 1, duration: 1.5 }, 3.5);

        // 4. Camera Morph / Cards Entry
        productData.forEach((p, i) => {
            tl.to(camera.position, {
                y: meshes[i].position.y, duration: 3, ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#uix-container", { opacity: 1, y: 0, duration: 0.8 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 4 + (i * 3));
        });

        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => { m.rotation.y = Math.sin(Date.now() * 0.001) * 0.15; });
            renderer.render(scene, camera);
        }

        // --- LOADER & START ---
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                if (loaded === frameCount) {
                    gsap.to("#navbar", { opacity: 1, delay: 1 });
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
