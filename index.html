<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        body { background-color: #000; margin: 0; overflow-x: hidden; }
        
        #hero-section { height: 500vh; position: relative; }
        
        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* Loader Discreto */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 99;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="w-48 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-[#00C2A8] w-0 transition-all duration-300"></div>
        </div>
    </div>

    <section id="hero-section">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d");
        const progress = document.getElementById("progress");
        const loader = document.getElementById("loader");

        const frameCount = 71;
        const currentFrame = index => (
            `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`
        );

        const images = [];
        const airVideo = { frame: 0 };

        // 1. Pré-carregamento de Imagens
        const preloadImages = () => {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = currentFrame(i);
                img.onload = () => {
                    loadedImagesCount++;
                    const percent = (loadedImagesCount / frameCount) * 100;
                    progress.style.width = `${percent}%`;
                    
                    if (loadedImagesCount === frameCount) {
                        initAnimation();
                    }
                };
                images.push(img);
            }
        };

        let loadedImagesCount = 0;
        preloadImages();

        // 2. Lógica de Desenho (Interpolada para RTX)
        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (!img) return;

            // Ajuste de Proporção (Cover)
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width / 2) - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;
            
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        // 3. Inicialização do GSAP
        function initAnimation() {
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 800);

            gsap.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                scrollTrigger: {
                    trigger: "#hero-section",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.2, // O "segredo" da suavidade
                },
                onUpdate: render // Redesenha a cada frame do GSAP
            });

            render(); // Desenha o primeiro frame
        }

        window.addEventListener("resize", render);
    </script>
</body>
</html>
