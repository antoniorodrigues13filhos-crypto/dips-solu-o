<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPS | Premium UIX Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-teal: #00C2A8;
            --color-dips-navy: #0D1B2A;
            --color-dips-blue-dark: #1B263B;
        }
        
        body { 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        /* NAVBAR PREMIUM */
        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
        }

        #main-scroller { height: 1600vh; position: relative; }

        .viewport-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
        }

        #hero-canvas { z-index: 2; object-fit: cover; }
        
        /* GRADIENTE DE FUNDO PARA PRODUTOS (REMOVIDO PRETO PURO) */
        #products-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            z-index: 0; opacity: 0; 
        }

        /* UIX GLASS CARDS */
        .uix-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            padding: 50px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: border-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .uix-card:hover {
            border-color: rgba(0, 194, 168, 0.4);
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.5); }
        
        .btn-premium {
            background: white;
            color: var(--color-dips-navy);
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background: var(--color-dips-teal);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 194, 168, 0.3);
        }
    </style>
</head>
<body class="antialiased">

    <div id="products-bg"></div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 py-3 flex justify-between items-center opacity-0">
        <div class="hidden md:block w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white cursor-pointer"></i></div>
    </nav>

    <div id="main-scroller">
        <div class="viewport-container"><canvas id="hero-canvas"></canvas></div>
        
        <div class="viewport-container"><canvas id="webgl-canvas"></canvas></div>

        <div class="fixed inset-0 flex flex-col justify-center items-center z-10 pointer-events-none">
            
            <div id="hero-txt" class="opacity-0 text-center">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter font-display">THE FUTURE</h1>
                <h1 class="text-7xl md:text-9xl font-black text-dips-teal tracking-tighter uppercase font-display text-glow">ENERGY.</h1>
            </div>

            <div id="uix-container" class="opacity-0 translate-y-24 w-full max-w-xl px-6">
                <div class="uix-card pointer-events-auto">
                    <div class="w-full">
                        <span class="text-dips-teal uppercase tracking-[0.4em] text-[10px] font-bold mb-4 block">Tecnologia Certificada</span>
                        <h2 id="p-title" class="text-3xl md:text-5xl font-black uppercase font-display mb-6">PRODUTO</h2>
                        <p id="p-desc" class="text-gray-400 text-sm md:text-base leading-relaxed font-light mb-10 max-w-sm mx-auto">
                            Carregando especificações técnicas de alta performance...
                        </p>
                        <button class="btn-premium">
                            Explorar Hardware
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 1. SETUP THREE.JS (AMBIENTE PRODUTOS) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 8;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // Iluminação de Estúdio
        const studioLight = new THREE.SpotLight(0x00C2A8, 60); studioLight.position.set(5, 5, 5); scene.add(studioLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Dados dos Produtos
        const productData = [
            { name: "Painel HP 160W", desc: "Módulo monocristalino de ultra eficiência projetado para máxima captação sob condições de baixa luminosidade.", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão inteligente de carga com proteção total contra surtos e otimização automatizada do ciclo das baterias.", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão de energia de alta fidelidade com monitoramento individual por módulo via Wi-Fi integrado.", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((d, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 3.5),
                new THREE.MeshStandardMaterial({ map: texLoader.load(d.img), transparent: true, metalness: 0.5, roughness: 0.3 })
            );
            mesh.position.y = -i * 12; // Espaçamento vertical para o scroll lerp
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- 🎥 2. HERO CANVAS (VÍDEO) ---
        const heroCanvas = document.getElementById('hero-canvas');
        const ctx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        function updateHero(prog) {
            const idx = Math.floor(prog * (frameCount - 1));
            if (images[idx]) {
                heroCanvas.width = window.innerWidth; heroCanvas.height = window.innerHeight;
                const img = images[idx];
                const ratio = Math.max(heroCanvas.width / img.width, heroCanvas.height / img.height);
                const w = img.width * ratio; const h = img.height * ratio;
                ctx.clearRect(0,0, heroCanvas.width, heroCanvas.height);
                ctx.drawImage(img, (heroCanvas.width-w)/2, (heroCanvas.height-h)/2, w, h);
            }
        }

        // --- ⚡ 3. MASTER TIMELINE (SCROLL CINEMATIC) ---
        const masterTl = gsap.timeline({
            scrollTrigger: { trigger: "#main-scroller", start: "top top", end: "bottom bottom", scrub: 1.5 }
        });

        // Fase 1: Video Hero
        masterTl.to({}, {
            duration: 4,
            onUpdate: function() {
                const p = this.progress() * 2.5; // Foca no vídeo no início
                if (p <= 1) updateHero(p);
            }
        }, 0);

        // Fase 2: Hero Text
        masterTl.to("#hero-txt", { opacity: 1, y: -20, duration: 1 }, 0.5);
        masterTl.to("#hero-txt", { opacity: 0, scale: 1.3, duration: 1 }, 2);

        // Fase 3: Transição para Mundo UIX (Crossfade)
        masterTl.to("#hero-canvas", { opacity: 0, duration: 1.5 }, 3.5);
        masterTl.to("#products-bg", { opacity: 1, duration: 1.5 }, 3.5);

        // Fase 4: Camera Morph / Entry Cards
        productData.forEach((p, i) => {
            masterTl.to(camera.position, {
                y: meshes[i].position.y,
                duration: 3,
                ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#uix-container", { opacity: 1, y: 0, duration: 0.8 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            }, 4 + (i * 3));
        });

        // Loop de Renderização 3D
        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => { m.rotation.y = Math.sin(Date.now() * 0.001) * 0.12; });
            renderer.render(scene, camera);
        }

        // --- 📦 4. CARREGAMENTO ---
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                if (loaded === frameCount) {
                    gsap.to("#loader", { opacity: 0, duration: 1, onComplete: () => document.getElementById('loader').style.display='none' });
                    gsap.to("#navbar", { opacity: 1, delay: 1 });
                    updateHero(0);
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
