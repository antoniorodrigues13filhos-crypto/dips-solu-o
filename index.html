<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }
        body { 
            background-color: #0D1B2A; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            color: white; 
            /* Otimização de scroll para iOS */
            -webkit-overflow-scrolling: touch; 
        }
        
        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* --- 📱 OTIMIZAÇÃO MOBILE CSS --- */
        #scroll-hero { 
            z-index: 20; 
            position: relative; 
            background-color: #0D1B2A; 
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 85% 98%, 50% 100%, 15% 98%, 0% 100%);
            /* Força renderização por hardware e evita repaints caros */
            will-change: transform, clip-path;
            transform: translateZ(0);
        }

        #hero-canvas { 
            image-rendering: -webkit-optimize-contrast;
            filter: saturate(1.1) contrast(1.1) brightness(0.9);
            will-change: transform;
        }

        /* Desativa blurs pesados no mobile para manter 60fps */
        @media (max-width: 768px) {
            .products-section {
                filter: none !important; /* Blur em seções grandes mata a performance mobile */
                will-change: transform;
            }
            .product-card {
                filter: none !important;
                will-change: transform, opacity;
            }
        }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; pointer-events: none;
        }

        .logo-adaptive { height: clamp(32px, 6vw, 64px); width: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.8)); }

        .products-section {
            position: relative;
            z-index: 10;
            margin-top: -15vh;
            background-color: #FFFFFF;
            color: #0D1B2A;
            padding: 150px 5vw 100px;
            transform: translateY(180px);
            opacity: 0;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <div class="w-48 h-[2px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0 transition-all duration-300"></div>
        </div>
    </div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="logo-adaptive pointer-events-auto">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <section id="scroll-hero" style="height:850vh;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"></canvas>
            
            <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(13,27,42,0.95) 0%, rgba(13,27,42,0.4) 40%, transparent 100%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:flex-end; padding:10vh 5vw;">
                <div id="hero-text-container" class="relative w-full max-w-5xl mx-auto">
                    
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full opacity-0">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="w-8 h-[2px] bg-intel-orange block"></span>
                            <span class="uppercase tracking-widest text-sm font-bold text-intel-orange">Alta Performance</span>
                        </div>
                        <h1 class="font-display text-5xl md:text-8xl lg:text-9xl font-black leading-[0.85] tracking-tighter uppercase text-intel-white">
                            O Futuro da <br/> <span class="text-intel-green-light text-glow">Energia™</span>
                        </h1>
                        <p class="mt-6 text-lg md:text-2xl max-w-xl text-intel-white/70">
                            Hardware de última geração projetado para eficiência absoluta.
                        </p>
                    </div>

                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0 translate-y-12">
                        <h2 class="font-display text-4xl md:text-7xl lg:text-8xl font-black leading-[0.9] tracking-tighter uppercase">
                            Transforme sol em <br/> <span class="text-intel-orange">Economia Real.</span>
                        </h2>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl md:text-6xl font-black uppercase mb-12">Hardware de Elite</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="product-card flex flex-col bg-gray-100 p-8 rounded-3xl">
                    <div class="aspect-square bg-gray-200 rounded-2xl mb-6"></div>
                    <h3 class="text-xl font-bold uppercase">Módulo Captação</h3>
                    <p class="text-intel-orange font-bold mt-2">R$ 1.200</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        lucide.createIcons();

        // Configurações globais de performance mobile
        ScrollTrigger.config({ ignoreMobileResize: true });

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d", { alpha: false, desynchronized: true });
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                if (canvas.width !== window.innerWidth) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        function tick() { render(); requestAnimationFrame(tick); }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                requestAnimationFrame(tick);
            }});

            // --- ⚡ INTERFACE TOUCH RESPONSIVE (MATCHMEDIA) ---
            const mm = gsap.matchMedia();

            mm.add({
                isMobile: "(max-width: 768px)",
                isDesktop: "(min-width: 769px)"
            }, (context) => {
                let { isMobile, isDesktop } = context.conditions;

                // 1. Timeline do Vídeo (Sincronia Direta no Mobile)
                gsap.to(airVideo, {
                    frame: frameCount - 1,
                    snap: "frame",
                    ease: "none",
                    scrollTrigger: {
                        trigger: "#scroll-hero",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: isMobile ? true : 0.6, // 'true' no mobile remove o lag de interpolação
                        invalidateOnRefresh: true
                    },
                    onUpdate: render
                });

                // 2. Animação dos Textos (Acompanhamento direto)
                const tlText = gsap.timeline({
                    scrollTrigger: {
                        trigger: "#scroll-hero",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: isMobile ? true : 0.6
                    }
                });

                tlText.to("#hero-text-1", { opacity: 1, y: 0, duration: 2 }, 0.5)
                      .to("#hero-text-1", { opacity: 0, y: isMobile ? -20 : -50, duration: 2 }, 4)
                      .to("#hero-text-2", { opacity: 1, y: 0, duration: 2 }, 5.5);

                // 3. Layer Reveal (Recorte simplificado para Mobile)
                gsap.to("#scroll-hero", {
                    y: isMobile ? -30 : -80,
                    scale: isMobile ? 0.98 : 0.96,
                    clipPath: isMobile ? 
                        "polygon(0% 0%, 100% 0%, 100% 85%, 50% 90%, 0% 85%)" : 
                        "polygon(0% 0%, 100% 0%, 100% 65%, 85% 82%, 50% 72%, 15% 82%, 0% 65%)",
                    ease: "none",
                    scrollTrigger: {
                        trigger: "#scroll-hero",
                        start: "85% top",
                        end: "bottom top",
                        scrub: isMobile ? true : 1.2
                    }
                });

                // 4. Produtos (Sem blur no mobile para performance)
                gsap.to(".products-section", {
                    y: 0,
                    opacity: 1,
                    scrollTrigger: {
                        trigger: "#scroll-hero",
                        start: "85% top",
                        end: "bottom top",
                        scrub: isMobile ? true : 1.2
                    }
                });
            });
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }
    </script>
</body>
</html>
