<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | O Futuro da Energia</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
        }

        body { 
            background-color: #000; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            color: white;
            scrollbar-width: none; 
        }
        
        /* Aumentei para 1400vh para acomodar os novos textos sem pressa */
        #hero-scroller { height: 1400vh; position: relative; }
        
        .canvas-container {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover;
            filter: saturate(1.1) contrast(1.1) brightness(0.9);
        }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%;
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 4rem;
            pointer-events: none;
        }

        /* CONTAINER DE TEXTOS */
        .headline-container {
            position: fixed;
            bottom: 12%;
            left: 8%;
            z-index: 50;
            pointer-events: none;
            width: 80%;
        }

        .premium-headline {
            font-family: 'Outfit', sans-serif;
            @apply text-5xl md:text-7xl lg:text-8xl font-black uppercase tracking-tighter leading-[0.85];
            opacity: 0;
            filter: blur(20px);
            transform: translateY(30px);
            will-change: transform, opacity, filter;
        }

        .sub-headline {
            @apply text-lg md:text-2xl font-light tracking-wide mt-6 max-w-xl opacity-0;
            filter: blur(10px);
            transform: translateY(20px);
        }

        .text-glow { text-shadow: 0 0 50px rgba(0, 194, 168, 0.4); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-32 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-dips-teal w-0 transition-all duration-300"></div>
        </div>
    </div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="h-8 md:h-10 object-contain">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <div class="headline-container">
        <div id="block-1" class="absolute inset-0">
            <h1 class="premium-headline">O FUTURO DA</h1>
            <h1 class="premium-headline text-dips-teal text-glow">ENERGIA.</h1>
        </div>

        <div id="block-2" class="absolute inset-0">
            <h1 class="premium-headline">TRANFORME SOL EM</h1>
            <h1 class="premium-headline text-dips-teal text-glow">ECONOMIA REAL.</h1>
            <p class="sub-headline" id="sub-2">E reduza sua conta de energia todos os meses.</p>
        </div>
    </div>

    <section id="hero-scroller">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d", { alpha: false });
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                const canvasW = window.innerWidth;
                const canvasH = window.innerHeight;
                const scale = Math.max(canvasW / img.width, canvasH / img.height);
                const x = (canvasW / 2) - (img.width / 2) * scale;
                const y = (canvasH / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
            requestAnimationFrame(render);
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.8, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                render();
            }});

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero-scroller",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.2
                }
            });

            // 🎞️ MOTION DOS FRAMES (0 a 70)
            tl.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                duration: 15 // Aumentei a duração interna para o scroll ser mais "lento"
            }, 0);

            // ✍️ ATO 1: O Futuro da Energia
            tl.to("#block-1 .premium-headline", { 
                opacity: 1, y: 0, filter: "blur(0px)", duration: 2, stagger: 0.1 
            }, 0.5);
            tl.to("#block-1", { 
                opacity: 0, y: -40, filter: "blur(20px)", duration: 2 
            }, 4);

            // ✍️ ATO 2: Transforme sol em economia
            tl.to("#block-2 .premium-headline", { 
                opacity: 1, y: 0, filter: "blur(0px)", duration: 2, stagger: 0.1 
            }, 5.5);
            tl.to("#sub-2", { 
                opacity: 0.8, y: 0, filter: "blur(0px)", duration: 1.5 
            }, 6.5);

            // Final: Mantém a cena limpa ou faz fade out
            tl.to("#block-2", { opacity: 0, y: -40, filter: "blur(20px)", duration: 2 }, 13);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
