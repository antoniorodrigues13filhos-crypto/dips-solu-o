<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | High-End Hardware</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        body { background-color: #010101; margin: 0; overflow-x: hidden; }
        
        #hero-section { height: 600vh; position: relative; }
        
        .canvas-container {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        /* TEXTURA: Overlay de Grão Cinematográfico */
        .film-grain {
            position: fixed; inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.04;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_Texture.png');
        }

        /* Vinheta para focar no Hardware */
        .vignette {
            position: fixed; inset: 0;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 120%);
        }

        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            /* Filtros de Textura e Cor */
            filter: contrast(1.1) brightness(0.9) saturate(0.9);
        }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="mb-4 text-[10px] tracking-[0.5em] text-white/40 uppercase">Sincronizando Hardware</div>
        <div class="w-48 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-[#00C2A8] w-0 transition-all duration-300 shadow-[0_0_15px_#00C2A8]"></div>
        </div>
    </div>

    <div class="film-grain"></div>
    <div class="vignette"></div>

    <section id="hero-section">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d", { alpha: false }); // Alpha false otimiza performance
        const progress = document.getElementById("progress");
        const loader = document.getElementById("loader");

        const frameCount = 71;
        const currentFrame = index => (
            `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`
        );

        const images = [];
        const airVideo = { frame: 0 };
        let loadedImagesCount = 0;

        const preloadImages = () => {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = currentFrame(i);
                img.onload = () => {
                    loadedImagesCount++;
                    const percent = (loadedImagesCount / frameCount) * 100;
                    progress.style.width = `${percent}%`;
                    if (loadedImagesCount === frameCount) initAnimation();
                };
                images.push(img);
            }
        };

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (!img) return;

            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            
            // Ativa suavização de alta qualidade
            context.imageSmoothingEnabled = true;
            context.imageSmoothingQuality = 'high';

            const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width / 2) - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;
            
            context.fillStyle = "#000";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        function initAnimation() {
            gsap.to(loader, { opacity: 0, duration: 1, onComplete: () => loader.style.display = "none" });

            gsap.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                scrollTrigger: {
                    trigger: "#hero-section",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5, // Levemente mais lento para dar sensação de peso
                },
                onUpdate: render
            });

            render();
        }

        preloadImages();
        window.addEventListener("resize", render);
    </script>
</body>
</html>
