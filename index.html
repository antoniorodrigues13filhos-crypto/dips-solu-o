<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | High-End Cinematic</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
        }
        
        body { background-color: #000; color: white; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px;
            width: 90%; left: 5%;
        }

        /* Hero Section */
        #hero-container { height: 800vh; position: relative; z-index: 2; background: #000; }
        #hero-canvas { position: sticky; top: 0; width: 100vw; height: 100vh; object-fit: cover; }

        /* Three.js Section */
        #webgl-section { height: 400vh; position: relative; z-index: 1; background: #000; }
        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.8s ease; }

        .product-label {
            position: fixed; bottom: 10%; width: 100%; text-align: center;
            z-index: 50; font-family: 'Outfit'; pointer-events: none;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:#000;z-index:9999;display:flex;justify-content:center;align-items:center;">
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.1);"><div id="progress-bar" style="height:100%;background:#00C2A8;width:0%;"></div></div>
    </div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 md:px-12 py-3 flex justify-between items-center shadow-2xl">
        <div class="hidden md:block w-32"></div> 
        <div class="flex items-center justify-center flex-1">
            <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        </div>
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white"></i></div>
    </nav>

    <div id="hero-container">
        <canvas id="hero-canvas"></canvas>
        <div id="hero-texts" style="position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; pointer-events:none;">
            <div id="t1" class="absolute text-center">
                <h1 class="font-display text-7xl md:text-9xl uppercase leading-none tracking-tighter">THE FUTURE</h1>
                <h1 class="font-display text-7xl md:text-9xl uppercase leading-none text-dips-teal tracking-tighter">ENERGY.</h1>
            </div>
        </div>
    </div>

    <div id="webgl-section">
        <canvas id="webgl-canvas"></canvas>
        <div id="product-info" class="product-label opacity-0">
            <h2 id="p-title" class="text-4xl md:text-6xl font-black uppercase text-white">PRODUTO</h2>
            <p id="p-desc" class="text-dips-teal uppercase tracking-[0.4em] text-xs mt-2">SOLUÇÃO DIPS</p>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- SETUP HERO (2D CANVAS) ---
        const heroCanvas = document.getElementById('hero-canvas');
        const heroCtx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loadedCount = 0;

        function updateHero(scroll) {
            const idx = Math.min(frameCount - 1, Math.floor(scroll * (frameCount - 1)));
            if (images[idx]) {
                heroCanvas.width = window.innerWidth;
                heroCanvas.height = window.innerHeight;
                const img = images[idx];
                const ratio = Math.max(heroCanvas.width / img.width, heroCanvas.height / img.height);
                const w = img.width * ratio; const h = img.height * ratio;
                heroCtx.drawImage(img, (heroCanvas.width - w)/2, (heroCanvas.height - h)/2, w, h);
            }
        }

        // --- SETUP 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 2, 10);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.SpotLight(0x00C2A8, 100); light.position.set(5, 5, 5); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const textureLoader = new THREE.TextureLoader();
        const productData = [
            { name: "Painel HP 160W", desc: "Captação Ultra", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão Inteligente", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão Pro", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        productData.forEach((data, i) => {
            const geometry = new THREE.PlaneGeometry(3, 3.5);
            const material = new THREE.MeshStandardMaterial({ map: textureLoader.load(data.img), transparent: true, metalness: 0.6, roughness: 0.2 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.y = -i * 10;
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- GSAP TIMELINE UNIFICADA ---
        const mainTl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.2
            }
        });

        // Scroll do Hero (Video)
        mainTl.to({}, {
            duration: 2,
            onUpdate: function() {
                const prog = this.progress() * 2; // Normaliza para a primeira parte
                if (prog <= 1) {
                    updateHero(prog);
                    document.getElementById('webgl-canvas').style.opacity = "0";
                    document.getElementById('product-info').style.opacity = "0";
                }
            }
        });

        // Transição e Produtos 3D
        productData.forEach((p, i) => {
            mainTl.to(camera.position, {
                y: meshes[i].position.y,
                duration: 2,
                ease: "power2.inOut",
                onStart: () => {
                    document.getElementById('webgl-canvas').style.opacity = "1";
                    document.getElementById('product-info').style.opacity = "1";
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                }
            });
        });

        // --- LOOP & CARREGAMENTO ---
        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => m.rotation.y = Math.sin(Date.now()*0.001)*0.1);
            renderer.render(scene, camera);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loadedCount++;
                document.getElementById('progress-bar').style.width = (loadedCount/frameCount*100) + "%";
                if(loadedCount === frameCount) {
                    document.getElementById('loader').style.display = 'none';
                    updateHero(0);
                    animate();
                }
            }
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
