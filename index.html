<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Ultra Smooth Hardware</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
        }

        body { 
            background-color: #0D1B2A; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
            color: white;
            /* Força renderização suave no scroll do mouse */
            scrollbar-width: none; 
        }
        
        #hero-section { height: 1000vh; position: relative; }
        
        .canvas-container {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
            /* Força a criação de uma camada na GPU */
            will-change: transform;
            transform: translateZ(0);
        }

        canvas { 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover;
            /* Suaviza a transição de cores e brilho */
            image-rendering: auto;
        }

        .text-layer {
            position: fixed; inset: 0;
            z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
            text-align: center;
        }

        .premium-headline {
            font-family: 'Outfit', sans-serif;
            @apply text-6xl md:text-8xl lg:text-9xl font-black uppercase tracking-tighter leading-none;
            opacity: 0;
            transform: translateY(30px);
            will-change: opacity, transform, filter;
        }

        #loader {
            position: fixed; inset: 0; background: #0D1B2A; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader">
        <div class="w-32 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-dips-teal w-0"></div>
        </div>
    </div>

    <div class="text-layer">
        <div id="block-1" class="absolute">
            <h1 class="premium-headline">THE FUTURE OF <br> <span class="text-dips-teal">ENERGY</span></h1>
        </div>
        <div id="block-2" class="absolute">
            <h1 class="premium-headline">MODULAR <br> <span class="text-white">HARDWARE</span></h1>
        </div>
        <div id="block-3" class="absolute">
            <h1 class="premium-headline">DIPS <span class="text-dips-teal">SOLUTION</span></h1>
        </div>
    </div>

    <section id="hero-section">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        // Otimização de contexto para RTX 3070
        const context = canvas.getContext("2d", { 
            alpha: false, 
            desynchronized: true,
            preserveDrawingBuffer: false
        });

        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedImagesCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        // Cache de dimensões para evitar reflows no loop
        let winW = window.innerWidth;
        let winH = window.innerHeight;

        const preloadImages = () => {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = currentFrame(i);
                img.onload = () => {
                    loadedImagesCount++;
                    document.getElementById("progress").style.width = `${(loadedImagesCount / frameCount) * 100}%`;
                    if (loadedImagesCount === frameCount) init();
                };
                images.push(img);
            }
        };

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img && context) {
                const scale = Math.max(winW / img.width, winH / img.height);
                const x = (winW / 2) - (img.width / 2) * scale;
                const y = (winH / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        // Loop de animação nativo da GPU para fluidez máxima
        function ticker() {
            render();
            requestAnimationFrame(ticker);
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                requestAnimationFrame(ticker); // Inicia o loop de renderização constante
            }});

            canvas.width = winW;
            canvas.height = winH;

            const masterTl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero-section",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1, // scrub 1 é mais responsivo que 1.5
                    immediateRender: false
                }
            });

            masterTl.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                duration: 10
            }, 0);

            // Ajuste de timing para leveza (fade mais rápido e limpo)
            masterTl.to("#block-1 .premium-headline", { opacity: 1, y: 0, filter: "blur(0px)", duration: 2 }, 0.5);
            masterTl.to("#block-1", { opacity: 0, y: -50, duration: 1.5 }, 2.5);

            masterTl.to("#block-2 .premium-headline", { opacity: 1, y: 0, filter: "blur(0px)", duration: 2 }, 4.5);
            masterTl.to("#block-2", { opacity: 0, y: -50, duration: 1.5 }, 6.5);

            masterTl.to("#block-3 .premium-headline", { opacity: 1, y: 0, filter: "blur(0px)", duration: 2 }, 8.5);
        }

        window.addEventListener("resize", () => {
            winW = window.innerWidth;
            winH = window.innerHeight;
            canvas.width = winW;
            canvas.height = winH;
        });

        preloadImages();
    </script>
</body>
</html>
