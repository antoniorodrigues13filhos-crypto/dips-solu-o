<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }
        body { background-color: #0D1B2A; margin: 0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; color: white; -webkit-overflow-scrolling: touch; }
        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.4); }
        
        #hero-canvas { 
            will-change: transform; 
            transform: translateZ(0);
            image-rendering: -webkit-optimize-contrast;
            display: block;
        }

        #scroll-hero { position: relative; overflow: hidden; z-index: 10; }

        .wave-container {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 50;
            pointer-events: none;
        }
        .wave-container svg { width: 100%; height: 100%; fill: #FFFFFF; }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; pointer-events: none;
        }

        .logo-adaptive { height: clamp(32px, 6vw, 64px); width: auto; pointer-events: auto; }

        .products-section {
            position: relative;
            z-index: 60;
            background-color: #FFFFFF;
            color: #0D1B2A;
            padding: 120px 5vw;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <div class="w-48 h-[2px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0 transition-all duration-300"></div>
        </div>
    </div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="logo-adaptive">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <section id="scroll-hero" style="height:800vh;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,27,42,0.95) 0%,rgba(13,27,42,0.4) 40%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:10vh 5vw;">
                <div id="hero-text-container" class="relative w-full max-w-5xl mx-auto">
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full opacity-0">
                        <h1 class="font-display text-5xl md:text-8xl lg:text-9xl font-bold leading-[0.9] tracking-tighter uppercase">
                            O Futuro da <br/> <span class="text-intel-green-light text-glow">Energia.</span>
                        </h1>
                    </div>

                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0">
                        <h2 class="font-display text-4xl md:text-7xl font-bold leading-tight uppercase">
                            Transforme sol em <br/> <span class="text-intel-orange">Economia.</span>
                        </h2>
                    </div>
                </div>
            </div>
            
            <div class="wave-container">
                <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                    <path id="organic-path" d="M0,160 C320,300 1120,300 1440,160 L1440,320 L0,320 Z"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="max-w-7xl mx-auto py-20">
            <h2 class="text-6xl font-black uppercase mb-10">Produtos</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function updateCanvas() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        // 🚨 CORREÇÃO: O render precisa rodar no onUpdate do GSAP para não travar
        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                updateCanvas();
            }});

            // Timeline Principal
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 0.5,
                    onUpdate: () => updateCanvas() // Garante que o canvas atualize no scroll
                }
            });

            tl.to(airVideo, { frame: frameCount - 1, snap: "frame", ease: "none", duration: 10 }, 0);
            
            // Textos
            tl.to("#hero-text-1", { opacity: 1, y: -20, duration: 2 }, 0.5);
            tl.to("#hero-text-1", { opacity: 0, y: -50, duration: 2 }, 4);
            tl.to("#hero-text-2", { opacity: 1, y: -20, duration: 2 }, 5.5);

            // Animação da Onda (SVG)
            gsap.to("#organic-path", {
                attr: { d: "M0,60 C480,200 960,200 1440,60 L1440,320 L0,320 Z" },
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "80% top",
                    end: "bottom top",
                    scrub: 1
                }
            });
        }

        // Carregamento
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", updateCanvas);
    </script>
</body>
</html>
