<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar | Intelbras</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-white: #ffedd7;
            --color-intel-black: #100904;
            --color-intel-green: #445231;
            --color-intel-green-light: #5d6c49;
            --color-intel-orange: #dc5000;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-intel-black);
            color: var(--color-intel-white);
            overflow: hidden; 
        }

        .text-glow { text-shadow: 0 0 20px rgba(220, 80, 0, 0.5); }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:var(--color-intel-black);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <i data-lucide="sun" class="w-16 h-16 text-intel-orange mb-4 animate-pulse"></i>
        <h2 class="text-2xl font-display font-bold text-white mb-4 uppercase tracking-widest">Sincronizando Hardware</h2>
        <div style="width:16rem;height:4px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:var(--color-intel-orange);width:0%;"></div>
        </div>
    </div>

    <section id="scroll-hero" style="height:500vh; position:relative;">
        <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas" style="display: block; width: 100vw; height: 100vh;"></canvas>
            <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(16,9,4,1) 0%, rgba(16,9,4,0.3) 50%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:center; padding:0 8vw;">
                <div id="hero-text-1" style="will-change: opacity, transform;" class="max-w-4xl transition-all duration-500">
                    <h1 class="font-display text-7xl md:text-9xl font-extrabold leading-[0.85] uppercase text-intel-white text-glow">
                        Energia <br/> <span class="text-intel-orange">Infinita.</span>
                    </h1>
                </div>

                <div id="hero-text-2" style="will-change: opacity, transform;" class="max-w-4xl opacity-0 translate-y-10 transition-all duration-500 absolute">
                    <h2 class="font-display text-6xl md:text-8xl font-extrabold leading-[0.85] uppercase text-intel-white">
                        Controle <br/> <span class="text-intel-green-light">Total.</span>
                    </h2>
                </div>
            </div>
        </div>
    </section>

    <section class="relative py-32 px-8 bg-intel-black z-10 border-t border-white/5">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
            <div>
                <i data-lucide="zap" class="w-10 h-10 text-intel-orange mx-auto mb-6"></i>
                <h3 class="text-2xl font-display font-bold uppercase mb-4">Geração</h3>
            </div>
            <div>
                <i data-lucide="shield-check" class="w-10 h-10 text-intel-green-light mx-auto mb-6"></i>
                <h3 class="text-2xl font-display font-bold uppercase mb-4">Segurança</h3>
            </div>
            <div>
                <i data-lucide="refresh-cw" class="w-10 h-10 text-intel-white mx-auto mb-6"></i>
                <h3 class="text-2xl font-display font-bold uppercase mb-4">Eficiência</h3>
            </div>
        </div>
    </section>

    <script>
        function initLucide() { window.lucide && lucide.createIcons(); }
        initLucide();

        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const frameCount = 71; // REDUZIDO PARA A QUANTIDADE ATUAL NO GIT
        const images = [];
        let loadedImages = 0;

        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const heroEl = document.getElementById('scroll-hero');
        const text1 = document.getElementById('hero-text-1');
        const text2 = document.getElementById('hero-text-2');

        const baseUrl = "/frame/ezgif-frame-"; 

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render(0);
        }

        function drawImageProp(img) {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let nw, nh, nx, ny;

            if (canvasRatio > imgRatio) {
                nw = canvas.width;
                nh = img.height * (canvas.width / img.width);
                nx = 0;
                ny = (canvas.height - nh) / 2;
            } else {
                nh = canvas.height;
                nw = img.width * (canvas.height / img.height);
                nx = (canvas.width - nw) / 2;
                ny = 0;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, nx, ny, nw, nh);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            const frameNum = i.toString().padStart(3, '0');
            img.src = `${baseUrl}${frameNum}.jpg`;
            
            img.onload = () => {
                loadedImages++;
                progressBar.style.width = Math.floor((loadedImages / frameCount) * 100) + "%";
                if (loadedImages === frameCount) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        loader.style.visibility = 'hidden';
                        document.body.style.overflow = 'auto';
                        updateCanvasSize();
                    }, 500);
                }
            };
            images.push(img);
        }

        function render(fraction) {
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * (frameCount - 1)));
            if (images[frameIndex] && images[frameIndex].complete) {
                drawImageProp(images[frameIndex]);
            }
        }

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const maxScroll = heroEl.offsetHeight - window.innerHeight;
            const fraction = Math.max(0, Math.min(1, scrollTop / maxScroll));

            requestAnimationFrame(() => {
                render(fraction);
                
                // AJUSTE DE TEMPO DOS TEXTOS PARA 71 FRAMES
                // Texto 1: Fica visível até 35% do scroll
                if (fraction < 0.35) {
                    text1.style.opacity = "1";
                    text1.style.transform = "translateY(0)";
                } else if (fraction >= 0.35 && fraction < 0.5) {
                    const fadeOut = (fraction - 0.35) / 0.15;
                    text1.style.opacity = 1 - fadeOut;
                    text1.style.transform = `translateY(${fadeOut * -20}px)`;
                } else {
                    text1.style.opacity = "0";
                }

                // Texto 2: Entra aos 55% e some aos 90%
                if (fraction > 0.55 && fraction < 0.7) {
                    const fadeIn = (fraction - 0.55) / 0.15;
                    text2.style.opacity = fadeIn;
                    text2.style.transform = `translateY(${(1 - fadeIn) * 20}px)`;
                } else if (fraction >= 0.7 && fraction < 0.9) {
                    text2.style.opacity = "1";
                    text2.style.transform = "translateY(0)";
                } else if (fraction >= 0.9) {
                    text2.style.opacity = 1 - ((fraction - 0.9) / 0.1);
                } else {
                    text2.style.opacity = "0";
                }
            });
        }, { passive: true });

        window.addEventListener('resize', updateCanvasSize);
    </script>
</body>
</html>
