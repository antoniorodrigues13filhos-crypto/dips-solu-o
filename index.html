<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }
        body { background-color: #0D1B2A; margin: 0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; color: white; -webkit-overflow-scrolling: touch; }
        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.4); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #hero-canvas { 
            will-change: transform; 
            transform: translateZ(0);
            image-rendering: -webkit-optimize-contrast;
            filter: saturate(1.1) contrast(1.1) brightness(0.9);
        }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; pointer-events: none;
        }

        @media (min-width: 768px) {
            .header-ui { padding: 40px 60px; }
        }

        .logo-adaptive {
            height: clamp(32px, 6vw, 64px);
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.8));
            pointer-events: auto;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <div class="w-48 h-[2px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0 transition-all duration-300"></div>
        </div>
    </div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="logo-adaptive">
        <div class="flex items-center gap-2 text-white font-bold text-[10px] tracking-[0.3em] uppercase opacity-70">
            Menu <span class="block w-6 h-[1px] bg-white"></span>
        </div>
    </header>

    <section id="scroll-hero" style="height:800vh;position:relative;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,27,42,0.95) 0%,rgba(13,27,42,0.4) 40%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:10vh 5vw;">
                <div id="hero-text-container" class="relative w-full max-w-5xl mx-auto">
                    
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full will-change-transform">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="w-8 h-[2px] bg-intel-orange block"></span>
                            <span class="uppercase tracking-widest text-sm font-bold text-intel-orange">Alta Performance</span>
                        </div>
                        <h1 class="font-display text-5xl md:text-7xl lg:text-8xl font-bold leading-[0.9] tracking-tight uppercase text-intel-white text-glow">
                            O Futuro da <br/> <span class="text-intel-green-light">Energia.</span>
                        </h1>
                        <p class="mt-6 text-lg md:text-2xl max-w-xl text-intel-white/70">
                            Uma arquitetura de hardware revolucionária que transforma cada raio de luz em eficiência máxima.
                        </p>
                    </div>

                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0 translate-y-12 will-change-transform">
                        <h2 class="font-display text-4xl md:text-6xl font-bold leading-tight tracking-tight uppercase">
                            Três Tecnologias. <br/> <span class="text-intel-orange">Um Ecossistema.</span>
                        </h2>
                        <div class="mt-8 flex flex-col md:flex-row gap-6">
                            <div class="flex items-center gap-4 glass-panel p-4 rounded-xl">
                                <div class="bg-intel-green-light p-3 rounded-full"><i data-lucide="sun" class="w-6 h-6 text-intel-black"></i></div>
                                <div><p class="text-xs text-intel-white/50 uppercase">Módulo 01</p><p class="font-bold">Captação</p></div>
                            </div>
                            <div class="flex items-center gap-4 glass-panel p-4 rounded-xl">
                                <div class="bg-intel-orange p-3 rounded-full"><i data-lucide="cpu" class="w-6 h-6 text-intel-black"></i></div>
                                <div><p class="text-xs text-intel-white/50 uppercase">Módulo 02</p><p class="font-bold">Controle PWM</p></div>
                            </div>
                            <div class="flex items-center gap-4 glass-panel p-4 rounded-xl">
                                <div class="bg-intel-white p-3 rounded-full"><i data-lucide="zap" class="w-6 h-6 text-intel-black"></i></div>
                                <div><p class="text-xs text-intel-white/50 uppercase">Módulo 03</p><p class="font-bold">Inversão 1200W</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="absolute bottom-8 right-8 z-10 flex flex-col items-center gap-2 opacity-50 mix-blend-difference">
                <span class="text-xs uppercase tracking-widest rotate-90 origin-right translate-y-8">Scroll</span>
                <div class="w-[1px] h-16 bg-intel-white relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-full bg-intel-orange"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        lucide.createIcons();

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d", { alpha: false, desynchronized: true });
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                if (canvas.width !== window.innerWidth) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        function tick() {
            render();
            requestAnimationFrame(tick);
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                requestAnimationFrame(tick);
            }});

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 0.5, 
                    invalidateOnRefresh: true
                }
            });

            tl.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                duration: 10
            }, 0);

            tl.to("#hero-text-1", { opacity: 1, y: 0, duration: 2 }, 0.5);
            tl.to("#hero-text-1", { opacity: 0, y: -50, filter: "blur(20px)", duration: 2 }, 4);
            tl.to("#hero-text-2", { opacity: 1, y: 0, filter: "blur(0px)", duration: 2 }, 5.5);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
