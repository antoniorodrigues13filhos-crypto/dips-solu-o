<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Soluções em Distribuição</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-blue-dark: #1B3A5B;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
            --color-dips-white: #FFFFFF;
            --color-dips-grey: #B0BEC5;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-dips-navy);
            color: var(--color-dips-white);
            overflow: hidden; 
        }

        .cta-button {
            background: linear-gradient(90deg, var(--color-dips-orange) 0%, var(--color-dips-teal) 100%);
            transition: all 0.3s ease;
        }
        
        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 194, 168, 0.5);
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.5); }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:var(--color-dips-navy);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <i data-lucide="sun" class="w-16 h-16 text-dips-teal mb-4 animate-pulse"></i>
        <div style="width:16rem;height:4px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:var(--color-dips-teal);width:0%;"></div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-sm shadow-lg px-8 py-6 md:py-8 flex justify-between items-center pointer-events-auto">
        <div class="flex items-center gap-2">
            <img src="logo/LOGO.png" alt="Logo" class="h-14 md:h-20 w-auto object-contain" onerror="this.style.opacity='0'">
        </div>
        <button class="flex gap-4 items-center text-base uppercase tracking-widest font-black text-dips-navy hover:text-dips-teal transition-colors">
            MENU <i data-lucide="menu" class="w-8 h-8"></i>
        </button>
    </nav>

    <section id="scroll-hero" style="height:500vh;position:relative;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0D1B2A 0%, rgba(13, 27, 42, 0.4) 50%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:15vh 6vw 0 6vw;">
                <div id="hero-text-1" class="transition-all duration-300">
                    <h1 class="font-display text-6xl md:text-8xl lg:text-9xl font-black leading-[0.8] uppercase text-white text-glow mb-2">O FUTURO DA</h1>
                    <h1 class="font-display text-6xl md:text-8xl lg:text-9xl font-black leading-[0.8] uppercase text-dips-teal text-glow mb-10">ENERGIA.</h1>
                    
                    <p class="text-dips-grey uppercase tracking-[0.2em] font-bold max-w-3xl text-sm md:text-lg mb-12">
                        Soluções técnicas e serviços em distribuição de energia.
                    </p>
                    
                    <button class="cta-button px-16 py-6 rounded-full font-black uppercase tracking-widest text-white text-sm md:text-base shadow-xl">
                        Veja Nossas Soluções
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function initLucide() { window.lucide && lucide.createIcons(); }
        initLucide();

        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const frameCount = 71; 
        const images = [];
        let loadedImages = 0;

        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const baseUrl = "frame/ezgif-frame-"; 

        function drawImageProp(img) {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let nw, nh, nx, ny;
            if (canvasRatio > imgRatio) {
                nw = canvas.width; nh = img.height * (canvas.width / img.width);
                nx = 0; ny = (canvas.height - nh) / 2;
            } else {
                nh = canvas.height; nw = img.width * (canvas.height / img.height);
                nx = (canvas.width - nw) / 2; ny = 0;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, nx, ny, nw, nh);
        }

        function update() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scroll = window.scrollY / (document.getElementById('scroll-hero').offsetHeight - window.innerHeight);
            const index = Math.min(frameCount - 1, Math.floor(Math.max(0, scroll) * (frameCount - 1)));
            if (images[index]) drawImageProp(images[index]);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `${baseUrl}${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loadedImages++;
                progressBar.style.width = Math.floor((loadedImages / frameCount) * 100) + "%";
                if (loadedImages === frameCount) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        loader.style.visibility = 'hidden';
                        document.body.style.overflow = 'auto';
                        update();
                    }, 500);
                }
            };
            img.onerror = () => { loadedImages++; if(loadedImages === frameCount) update(); };
            images.push(img);
        }

        window.addEventListener('scroll', update);
        window.addEventListener('resize', update);
    </script>
</body>
</html>
