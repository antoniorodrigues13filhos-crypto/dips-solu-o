<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips Solução em Distribuição | Sistema Solar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-black: #0D1B2A;       
            --color-intel-blue-dark: #1B3A5B;  
            --color-intel-teal: #00C2A8;       
            --color-intel-orange: #FF6B00;     
            --color-intel-white: #FFFFFF;      
            --color-intel-grey: #B0BEC5;       
            
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-intel-black);
            color: var(--color-intel-white);
            overflow: hidden; 
        }

        h1, h2, h3, h4, h5, .font-display { font-family: var(--font-display); }

        .glass-panel {
            background: rgba(27, 58, 91, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 194, 168, 0.1);
        }

        .text-glow { 
            text-shadow: 0 0 20px rgba(0, 194, 168, 0.4);
        }

        .cta-button {
            background-color: var(--color-intel-orange);
            transition: all 0.3s ease;
        }
        
        .cta-button:hover {
            background-color: #e55a00;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.4);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-intel-black); }
        ::-webkit-scrollbar-thumb { background: var(--color-intel-blue-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-intel-teal); }
    </style>
</head>
<body class="antialiased">

    <div id="loader" style="position:fixed;inset:0;background:var(--color-intel-black);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <i data-lucide="sun" class="w-16 h-16 text-intel-teal mb-4 animate-pulse"></i>
        <h2 class="text-3xl font-display font-bold text-intel-white mb-2 tracking-tight uppercase">Dips Solução</h2>
        <div style="width:16rem;height:0.5rem;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:var(--color-intel-teal);transition:all 100ms ease-out;width:0%;"></div>
        </div>
        <p id="loading-text" class="text-intel-grey mt-2 text-sm font-medium uppercase tracking-widest">Sincronizando Hardware 0%...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 mix-blend-difference px-6 py-6 flex justify-between items-center pointer-events-none">
        <div class="font-display font-bold text-2xl tracking-tighter uppercase text-intel-white pointer-events-auto">
            Dips Solução em Distribuição<span class="text-intel-teal">.</span>
        </div>
        <button class="pointer-events-auto flex gap-2 items-center text-sm uppercase tracking-widest font-semibold hover:text-intel-teal transition-colors">
            Menu <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
    </nav>

    <section id="scroll-hero" style="height:500vh;position:relative;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0D1B2A 0%, rgba(13, 27, 42, 0.4) 40%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:10vh 5vw;">
                <div id="hero-text-container" class="relative w-full max-w-5xl mx-auto">
                    <div id="hero-text-1" class="absolute bottom-0 left-0 w-full transition-all duration-300">
                        <h1 class="font-display text-5xl md:text-7xl lg:text-8xl font-bold leading-[0.9] tracking-tight uppercase text-intel-white text-glow">
                            O Futuro da <br/> <span class="text-intel-teal">Energia.</span>
                        </h1>
                    </div>
                    <div id="hero-text-2" class="absolute bottom-0 left-0 w-full opacity-0 translate-y-12 transition-all duration-300">
                        <h2 class="font-display text-4xl md:text-6xl font-bold uppercase tracking-tight text-intel-white">
                            Três Tecnologias. <br/> <span class="text-intel-orange">Um Ecossistema.</span>
                        </h2>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="relative py-32 px-6 bg-intel-black z-10 border-t border-white/5">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="p-8 glass-panel rounded-2xl hover:border-intel-teal transition-all duration-500">
                <i data-lucide="sun" class="w-8 h-8 text-intel-teal mb-4"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-intel-white">Placa 160W</h3>
                <p class="text-intel-grey mt-2">Distribuição de alta performance.</p>
            </div>
            <div class="p-8 glass-panel rounded-2xl hover:border-intel-teal transition-all duration-500">
                <i data-lucide="cpu" class="w-8 h-8 text-intel-teal mb-4"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-intel-white">Controlador</h3>
                <p class="text-intel-grey mt-2">Tecnologia avançada Dips.</p>
            </div>
            <div class="p-8 glass-panel rounded-2xl hover:border-intel-teal transition-all duration-500">
                <i data-lucide="zap" class="w-8 h-8 text-intel-teal mb-4"></i>
                <h3 class="font-display text-2xl font-bold uppercase text-intel-white">Inversor</h3>
                <p class="text-intel-grey mt-2">Sua solução em energia.</p>
            </div>
        </div>
        
        <div class="mt-16 text-center">
            <button class="cta-button px-10 py-4 rounded-full font-bold uppercase tracking-widest text-white">
                Falar com Especialista
            </button>
        </div>
    </nav>

    <script>
        function initLucide() { window.lucide && lucide.createIcons(); }
        initLucide();

        const frameCount = 71; 
        const images = [];
        let loadedImages = 0;
        
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');
        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const heroEl = document.getElementById('scroll-hero');
        const text1 = document.getElementById('hero-text-1');
        const text2 = document.getElementById('hero-text-2');

        const baseUrl = "/frame/ezgif-frame-"; 

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderCurrentFrame();
        }

        function renderCurrentFrame() {
            const maxScroll = heroEl.offsetHeight - window.innerHeight;
            const fraction = Math.max(0, Math.min(1, window.scrollY / maxScroll));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * (frameCount - 1)));
            
            if (images[frameIndex] && images[frameIndex].complete) {
                drawCover(images[frameIndex]);
            }
        }

        function drawCover(img) {
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let rw, rh, ox, oy;
            if (canvasRatio > imgRatio) {
                rw = canvas.width; rh = img.height * (canvas.width / img.width);
                ox = 0; oy = (canvas.height - rh) / 2;
            } else {
                rh = canvas.height; rw = img.width * (canvas.height / img.height);
                ox = (canvas.width - rw) / 2; oy = 0;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, ox, oy, rw, rh);
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            const frameNum = i.toString().padStart(3, '0');
            img.src = `${baseUrl}${frameNum}.jpg`;
            img.onload = () => {
                loadedImages++;
                const p = Math.floor((loadedImages / frameCount) * 100);
                progressBar.style.width = p + "%";
                loadingText.innerText = "Sincronizando Sistema " + p + "%...";
                if (loadedImages === frameCount) {
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        loader.style.visibility = 'hidden';
                        document.body.style.overflow = 'auto';
                        updateCanvasSize();
                    }, 500);
                }
            };
            images[i - 1] = img;
        }

        window.addEventListener('resize', updateCanvasSize);
        window.addEventListener('scroll', () => {
            requestAnimationFrame(() => {
                renderCurrentFrame();
                const max = heroEl.offsetHeight - window.innerHeight;
                const f = window.scrollY / max;
                if(text1) text1.style.opacity = f > 0.3 ? 0 : 1;
                if(text2) {
                    text2.style.opacity = (f > 0.35 && f < 0.8) ? 1 : 0;
                    text2.style.transform = f > 0.35 ? 'translateY(0)' : 'translateY(48px)';
                }
            });
        }, { passive: true });
    </script>
</body>
</html>
