<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIPS | Cinematic Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-dips-teal: #00C2A8;
            --color-dips-navy: #0D1B2A;
        }
        body { background: #000; color: #fff; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
        
        canvas { position: fixed; top: 0; left: 0; outline: none; z-index: 1; }

        .cinematic-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 100px;
        }

        .product-info {
            position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
            z-index: 20; text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="cinematic-overlay"></div>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] md:w-[60%] glass-nav px-8 py-4 flex justify-between items-center z-50">
        <img src="logo/LOGO.png" alt="DIPS" class="h-8 md:h-12 object-contain">
        <div class="flex gap-6 items-center uppercase text-[10px] tracking-[0.3em] font-bold">
            <span class="text-dips-teal">Hardware</span>
            <span>Solutions</span>
            <i data-lucide="menu" class="w-5 h-5"></i>
        </div>
    </nav>

    <canvas id="webgl"></canvas>

    <div class="product-info">
        <h2 id="p-title" class="text-4xl md:text-7xl font-black uppercase tracking-tighter opacity-0 translate-y-10">Dips Solution</h2>
        <p id="p-desc" class="text-dips-teal text-xs uppercase tracking-[0.5em] mt-4 opacity-0">Sincronizando Hardware...</p>
    </div>

    <main class="relative z-0">
        <section class="h-[800vh] pointer-events-none"></section> </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 2, 12);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({
            canvas: document.querySelector('#webgl'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // ACES Filmic Color Grading
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        // --- 🎥 2. LIGHTING (LUXURY HIGHLIGHTS) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const keyLight = new THREE.SpotLight(0x00C2A8, 50);
        keyLight.position.set(5, 5, 5);
        scene.add(keyLight);

        const rimLight = new THREE.SpotLight(0xffffff, 30);
        rimLight.position.set(-5, 2, -5);
        scene.add(rimLight);

        // --- 🧊 3. PRODUTOS (MESHES COM MATERIAIS PREMIUM) ---
        const textureLoader = new THREE.TextureLoader();
        const productData = [
            { name: "PAINEL HP 160W", desc: "Captação de Ultra Eficiência", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "CONTROLADOR PWM", desc: "Gestão Inteligente de Carga", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "MICROINVERSOR", desc: "Conversão de Alta Fidelidade", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        productData.forEach((data, i) => {
            const geometry = new THREE.PlaneGeometry(2.5, 3);
            const material = new THREE.MeshStandardMaterial({
                map: textureLoader.load(data.img),
                transparent: true,
                metalness: 0.8,
                roughness: 0.1,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.y = -i * 10; // Vertical stack para o scroll vira timeline
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- ⚡ 4. CINEMATIC SCROLL TIMELINE (GSAP) ---
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5,
            }
        });

        meshes.forEach((mesh, i) => {
            // Path Animation: Câmera mergulhando
            tl.to(camera.position, {
                y: mesh.position.y,
                z: 4,
                duration: 2,
                ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#p-title", { opacity: 1, y: 0, textContent: productData[i].name });
                    gsap.to("#p-desc", { opacity: 1, textContent: productData[i].desc });
                }
            }, i * 2.5);

            // Morph/Rotation
            tl.from(mesh.rotation, { y: 1.5, duration: 1.5 }, i * 2.5);
        });

        // --- 🌀 5. RENDER LOOP ---
        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) - 0.5;
            mouse.y = (e.clientY / window.innerHeight) - 0.5;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Tracking Suave (Câmera Follow)
            camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.05;
            camera.position.y += (-mouse.y * 0.5 - camera.position.y) * 0.05;
            camera.lookAt(0, camera.position.y, 0);

            renderer.render(scene, camera);
        }

        animate();

        // RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        lucide.createIcons();
    </script>
</body>
</html>
