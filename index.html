<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-blue: #1B3A5B;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
        }

        body { background-color: #0D1B2A; margin: 0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; color: white; }
        
        #hero-section { height: 1000vh; position: relative; }
        
        .canvas-container {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        canvas { width: 100vw; height: 100vh; object-fit: cover; }

        /* Camadas de Texto Interativo */
        .text-layer {
            position: fixed; inset: 0;
            z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
            text-align: center;
            padding: 2rem;
        }

        .premium-headline {
            font-family: 'Outfit', sans-serif;
            @apply text-5xl md:text-8xl lg:text-9xl font-black uppercase tracking-tighter leading-none;
            filter: blur(20px);
            opacity: 0;
        }

        .cta-button {
            @apply bg-dips-orange px-10 py-5 rounded-full font-bold uppercase tracking-widest text-sm transition-all;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.3);
            pointer-events: auto;
            opacity: 0;
            transform: translateY(30px);
        }

        .cta-button:hover { @apply scale-105; box-shadow: 0 15px 40px rgba(255, 107, 0, 0.5); }

        #loader {
            position: fixed; inset: 0; background: #0D1B2A; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="mb-4 text-[10px] tracking-[0.5em] text-white/40 uppercase">Hardware Syncing</div>
        <div class="w-48 h-[1px] bg-dips-blue overflow-hidden">
            <div id="progress" class="h-full bg-dips-teal w-0 shadow-[0_0_15px_#00C2A8]"></div>
        </div>
    </div>

    <div class="text-layer">
        <div id="block-1" class="absolute">
            <h1 class="premium-headline">O Futuro da <br> <span class="text-dips-teal">Energia</span></h1>
        </div>

        <div id="block-2" class="absolute">
            <h1 class="premium-headline">Performance <br> <span class="text-white">Modular</span></h1>
            <p class="mt-6 text-dips-blue font-bold uppercase tracking-[0.4em] opacity-0" id="sub-2">Hardware de Alta Fidelidade</p>
        </div>

        <div id="block-3" class="absolute">
            <h1 class="premium-headline mb-10">Dips <span class="text-dips-teal">Solution</span></h1>
            <button class="cta-button">Explorar Hardware</button>
        </div>
    </div>

    <section id="hero-section">
        <div class="canvas-container">
            <canvas id="video-canvas"></canvas>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d");
        const progress = document.getElementById("progress");
        const loader = document.getElementById("loader");

        const frameCount = 71;
        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        const images = [];
        const airVideo = { frame: 0 };
        let loadedImagesCount = 0;

        // 1. Pré-carregamento
        const preloadImages = () => {
            for (let i = 1; i <= frameCount; i++) {
                const img = new Image();
                img.src = currentFrame(i);
                img.onload = () => {
                    loadedImagesCount++;
                    progress.style.width = `${(loadedImagesCount / frameCount) * 100}%`;
                    if (loadedImagesCount === frameCount) initAnimation();
                };
                images.push(img);
            }
        };

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (!img) return;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width / 2) - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        function initAnimation() {
            gsap.to(loader, { opacity: 0, duration: 1, onComplete: () => loader.style.display = "none" });

            // Timeline para o Vídeo
            const videoTimeline = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero-section",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5,
                }
            });

            videoTimeline.to(airVideo, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                onUpdate: render
            }, 0);

            // Timeline para os Textos Interativos
            // BLOCO 1
            videoTimeline.to("#block-1 .premium-headline", { opacity: 1, filter: "blur(0px)", duration: 1 }, 0.2);
            videoTimeline.to("#block-1", { opacity: 0, y: -100, duration: 1 }, 1.5);

            // BLOCO 2
            videoTimeline.to("#block-2 .premium-headline", { opacity: 1, filter: "blur(0px)", duration: 1 }, 2.5);
            videoTimeline.to("#sub-2", { opacity: 1, duration: 0.5 }, 3);
            videoTimeline.to("#block-2", { opacity: 0, scale: 0.8, duration: 1 }, 4.5);

            // BLOCO 3 (FINAL)
            videoTimeline.to("#block-3 .premium-headline", { opacity: 1, filter: "blur(0px)", duration: 1 }, 5.5);
            videoTimeline.to("#block-3 .cta-button", { opacity: 1, y: 0, duration: 1 }, 6);

            render();
        }

        preloadImages();
        window.addEventListener("resize", render);
    </script>
</body>
</html>
