<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dips | Hardware Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-intel-orange: #FF6B00;
            --color-intel-green-light: #00C2A8;
            --color-intel-black: #0D1B2A;
            --color-intel-white: #FFFFFF;
        }
        body { background-color: #0D1B2A; margin: 0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; color: white; -webkit-overflow-scrolling: touch; }
        
        #hero-canvas { 
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        #scroll-hero { position: relative; z-index: 10; }

        .wave-container {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 50;
            pointer-events: none;
        }
        .wave-container svg { 
            width: 100%; 
            height: 100%; 
            fill: #FFFFFF;
            filter: drop-shadow(0px -15px 25px rgba(0,0,0,0.08));
        }

        .header-ui {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px;
        }

        /* --- 💎 ESTILOS BENEFÍCIOS --- */
        .benefits-impact-section {
            background-color: #FFFFFF;
            color: #0D1B2A;
            padding: 120px 5vw;
            position: relative;
            z-index: 55;
            text-align: center;
        }
        .benefit-number {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1;
        }
        .benefit-context {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(13, 27, 42, 0.4);
            margin-top: 8px;
            display: block;
        }

        .products-section {
            position: relative;
            z-index: 60;
            background-color: #FFFFFF;
            color: #0D1B2A;
            padding: 100px 5vw;
        }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-intel-black z-[100] flex flex-col justify-center items-center">
        <div class="w-48 h-[2px] bg-white/10 overflow-hidden">
            <div id="progress" class="h-full bg-intel-green-light w-0"></div>
        </div>
    </div>

    <header class="header-ui">
        <img src="logo/LOGO.png" alt="Dips" class="h-10 md:h-12">
        <div class="text-white font-bold text-[10px] tracking-[0.3em] uppercase">Menu</div>
    </header>

    <section id="scroll-hero" style="height:800vh;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas"></canvas>
            
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,27,42,0.95) 0%,rgba(13,27,42,0.4) 40%, transparent 100%);z-index:1;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:flex-end;padding:15vh 8vw;">
                <div id="hero-text-1" class="opacity-0 translate-y-20 will-change-transform">
                    <h1 class="text-6xl md:text-9xl font-black uppercase leading-[0.8] tracking-tighter">
                        O Futuro da <br/> <span class="text-intel-green-light">Energia.</span>
                    </h1>
                </div>
                <div id="hero-text-2" class="absolute opacity-0 translate-y-20 will-change-transform">
                    <h2 class="text-5xl md:text-8xl font-black uppercase leading-[0.8] tracking-tighter">
                        Transforme Sol em <br/> <span class="text-intel-orange">Economia.</span>
                    </h2>
                </div>
            </div>
            
            <div class="wave-container">
                <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                    <path id="organic-path" d="M0,160 C320,300 1120,300 1440,160 L1440,320 L0,320 Z"></path>
                </svg>
            </div>
        </div>
    </section>

    <section class="benefits-impact-section">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-[0.9] mb-4">
                Liberdade Energética <br/> <span class="text-gray-400">ao seu alcance.</span>
            </h2>
            <p class="uppercase tracking-[0.3em] font-bold text-xs opacity-50">Investimento inteligente com retorno imediato.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-6xl mx-auto mt-20">
            <div>
                <span class="benefit-number text-intel-green-light" data-target="95">-0%</span>
                <p class="uppercase tracking-widest font-bold text-xs">Economia</p>
                <span class="benefit-context">na conta de energia</span>
            </div>
            <div>
                <span class="benefit-number text-intel-orange" data-target="25">+0</span>
                <p class="uppercase tracking-widest font-bold text-xs">Anos</p>
                <span class="benefit-context">de vida útil média</span>
            </div>
            <div>
                <span class="benefit-number text-intel-black" data-target="24">0h</span>
                <p class="uppercase tracking-widest font-bold text-xs">Controle</p>
                <span class="benefit-context">de monitoramento inteligente</span>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-6xl font-black uppercase mb-10 text-intel-black">Hardware de Elite</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
                <div class="bg-gray-100 aspect-square rounded-3xl"></div>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 71;
        const images = [];
        const airVideo = { frame: 0 };
        let loadedCount = 0;

        const currentFrame = index => `frame/ezgif-frame-${index.toString().padStart(3, '0')}.jpg`;

        function render() {
            const img = images[Math.floor(airVideo.frame)];
            if (img) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                context.drawImage(img, x, y, img.width * scale, img.height * scale);
            }
        }

        function init() {
            gsap.to("#loader", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById("loader").style.display = "none";
                render();
            }});

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 0.6,
                    onUpdate: render
                }
            });

            tl.to(airVideo, { frame: frameCount - 1, snap: "frame", ease: "none", duration: 10 }, 0);
            tl.to("#hero-text-1", { opacity: 1, y: -40, duration: 2 }, 1);
            tl.to("#hero-text-1", { opacity: 0, y: -100, duration: 2 }, 4);
            tl.to("#hero-text-2", { opacity: 1, y: -40, duration: 2 }, 5.5);

            gsap.to("#organic-path", {
                attr: { d: "M0,60 C480,220 960,220 1440,60 L1440,320 L0,320 Z" },
                scrollTrigger: {
                    trigger: "#scroll-hero",
                    start: "80% top",
                    end: "bottom top",
                    scrub: 1
                }
            });

            gsap.to("#organic-path", {
                attr: { d: "M0,150 C380,280 1060,280 1440,150 L1440,320 L0,320 Z" },
                duration: 3,
                ease: "sine.inOut",
                repeat: -1,
                yoyo: true
            });

            // 🎯 SCRIPT DO CONTADOR ANIMADO
            document.querySelectorAll('[data-target]').forEach(counter => {
                const targetValue = parseInt(counter.getAttribute('data-target'));
                const prefix = counter.innerText.includes('-') ? '-' : (counter.innerText.includes('+') ? '+' : '');
                const suffix = counter.innerText.toLowerCase().includes('h') ? 'h' : (counter.innerText.includes('%') ? '%' : '');

                gsap.to(counter, {
                    innerText: targetValue,
                    duration: 2,
                    ease: "power2.out",
                    scrollTrigger: {
                        trigger: ".benefits-impact-section",
                        start: "top 80%",
                        toggleActions: "play none none none"
                    },
                    onUpdate: function() {
                        counter.innerText = prefix + Math.floor(this.targets()[0].innerText) + suffix;
                    }
                });
            });
        }

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            img.onload = () => {
                loadedCount++;
                document.getElementById("progress").style.width = `${(loadedCount/frameCount)*100}%`;
                if(loadedCount === frameCount) init();
            };
            images.push(img);
        }

        window.addEventListener("resize", render);
    </script>
</body>
</html>
