<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | High-End Energy Solutions</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-navy: #0D1B2A;
            --color-dips-teal: #00C2A8;
            --color-dips-orange: #FF6B00;
        }
        
        body { 
            background-color: #0D1B2A; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        /* 🧊 5. SHADER EFFECTS & GLASS */
        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px;
            width: 90%; left: 5%;
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        /* 🌫️ 2. DEPTH OF FIELD + 💡 4. LIGHT BLOOM */
        .product-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            perspective: 1200px;
            overflow: hidden;
            will-change: transform;
        }

        /* ✨ 3. MORPHING / LUXURY HOVER */
        .product-card:hover {
            border-color: rgba(0, 194, 168, 0.5);
            background: rgba(0, 194, 168, 0.03);
            box-shadow: 0 0 60px rgba(0, 194, 168, 0.15);
            transform: translateY(-20px) rotateX(5deg) rotateY(-2deg);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: contain;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.05));
        }

        .product-card:hover .product-image {
            transform: translateZ(60px) scale(1.1); /* 🌫️ Dolly In */
            filter: drop-shadow(0 0 35px rgba(0, 194, 168, 0.4)) brightness(1.2); /* 💡 Bloom */
        }

        /* 🌀 6. PARALLAX DEPTH LAYERS */
        .parallax-bg-text {
            position: absolute;
            font-size: 14rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            will-change: transform;
        }

        .text-glow { text-shadow: 0 0 30px rgba(0, 194, 168, 0.6); }
        canvas { will-change: transform, opacity; }
    </style>
</head>
<body class="antialiased overflow-hidden">

    <div id="loader" style="position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s;">
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.1);"><div id="progress-bar" style="height:100%;background:#00C2A8;width:0%;"></div></div>
    </div>

    <nav id="navbar" class="fixed top-0 z-50 glass-navbar px-8 md:px-12 py-3 flex justify-between items-center">
        <div class="hidden md:block w-32"></div> 
        <div class="flex items-center justify-center flex-1">
            <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        </div>
        <div class="w-32 flex justify-end">
            <div class="flex flex-col gap-1 cursor-pointer group">
                <span class="w-6 h-[2px] bg-white group-hover:bg-dips-teal transition-all"></span>
                <span class="w-4 h-[2px] bg-dips-teal self-end"></span>
            </div>
        </div>
    </nav>

    <section id="scroll-hero" style="height:800vh; position:relative;">
        <div id="sticky-engine" style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%;"></canvas>
            <div id="overlay-dark" style="position:absolute; inset:0; background:linear-gradient(to top, #0D1B2A 0%, rgba(13,27,42,0.4) 50%, transparent 100%); z-index:1;"></div>
            
            <div style="position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                <div id="t1" class="absolute transition-all duration-700">
                    <h1 class="font-display text-7xl md:text-9xl uppercase leading-none mb-4 tracking-tighter">THE FUTURE</h1>
                    <h1 class="font-display text-7xl md:text-9xl uppercase leading-none text-dips-teal text-glow tracking-tighter">ENERGY.</h1>
                </div>
                <div id="t2" class="absolute opacity-0 transition-all duration-700">
                    <h2 class="font-display text-5xl md:text-8xl uppercase text-dips-orange">MODULAR.</h2>
                </div>
            </div>
        </div>
    </section>

    <section id="products-area" class="relative z-10 px-8 py-40 bg-dips-navy overflow-hidden">
        <div class="parallax-bg-text" id="bg-text-1" style="top: 5%; left: -5%;">SOLUTIONS</div>
        <div class="parallax-bg-text" id="bg-text-2" style="bottom: 5%; right: -5%;">TECHNOLOGY</div>

        <div class="max-w-7xl mx-auto relative z-10">
            <div class="mb-32 text-center">
                <h2 class="font-display text-5xl md:text-7xl uppercase tracking-tighter">High-End<br/><span class="text-dips-teal text-glow">Portfolio</span></h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <div class="product-card p-12 rounded-[2.5rem] group">
                    <img src="produtos/produto-8942-placa-solar-policristalino-160w.jpg" class="product-image" alt="Painel">
                    <h3 class="font-display text-3xl uppercase mt-8 text-white">Painel 160W</h3>
                    <p class="text-gray-500 mt-4 leading-relaxed uppercase tracking-widest text-xs font-bold">Ultra Efficiency / Mono</p>
                </div>

                <div class="product-card p-12 rounded-[2.5rem] group">
                    <img src="produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png" class="product-image" alt="Controlador">
                    <h3 class="font-display text-3xl uppercase mt-8 text-white">Control PWM</h3>
                    <p class="text-gray-500 mt-4 leading-relaxed uppercase tracking-widest text-xs font-bold">Smart Management / 10A</p>
                </div>

                <div class="product-card p-12 rounded-[2.5rem] group">
                    <img src="produtos/MICROINVERSOR 1200W EGT 1200.png" class="product-image" alt="Microinversor">
                    <h3 class="font-display text-3xl uppercase mt-8 text-white">Inverter 1.2kW</h3>
                    <p class="text-gray-500 mt-4 leading-relaxed uppercase tracking-widest text-xs font-bold">Pro Conversion / Real-time</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // ✅ DEFINIÇÃO CORRETA DA FUNÇÃO LUCIDE
        function initLucide() { 
            if (window.lucide) {
                lucide.createIcons(); 
            }
        }
        
        initLucide();

        const canvas = document.getElementById('hero-canvas');
        const context = canvas.getContext('2d');
        const navbar = document.getElementById('navbar');
        const frameCount = 71; 
        const images = [];
        let loadedImages = 0;

        function handleScroll() {
            const scrollHero = document.getElementById('scroll-hero');
            const totalHeight = scrollHero.offsetHeight - window.innerHeight;
            const scroll = window.scrollY / totalHeight;
            
            // 🌀 6. PARALLAX
            const bg1 = document.getElementById('bg-text-1');
            const bg2 = document.getElementById('bg-text-2');
            if(bg1) bg1.style.transform = `translateX(${window.scrollY * 0.2}px)`;
            if(bg2) bg2.style.transform = `translateX(${-window.scrollY * 0.2}px)`;

            // 🌫️ 2. NAV MOTION
            const navMove = Math.min(25, scroll * 100); 
            navbar.style.transform = `translateY(${-navMove}px) scale(${1 - (scroll * 0.03)})`;

            // CANVAS RENDERING & ✨ 3. MORPHING
            const idx = Math.min(frameCount - 1, Math.floor(scroll * (frameCount - 1)));
            if (images[idx]) {
                const img = images[idx];
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = img.width / img.height;
                let nw, nh, nx, ny;

                if (canvasRatio > imgRatio) {
                    nw = canvas.width; nh = img.height * (canvas.width / img.width);
                    nx = 0; ny = (canvas.height - nh) / 2;
                } else {
                    nh = canvas.height; nw = img.width * (canvas.height / img.height);
                    nx = (canvas.width - nw) / 2; ny = 0;
                }
                
                if (scroll > 0.8) {
                    const zoom = 1 + (scroll - 0.8) * 3;
                    context.setTransform(zoom, 0, 0, zoom, canvas.width/2 * (1 - zoom), canvas.height/2 * (1 - zoom));
                } else {
                    context.setTransform(1,0,0,1,0,0);
                }
                
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(img, nx, ny, nw, nh);
            }

            // TEXT STAGES
            const t1 = document.getElementById('t1');
            const t2 = document.getElementById('t2');
            if(t1) {
                t1.style.opacity = scroll < 0.25 ? 1 : 0;
                t1.style.transform = `translateY(${scroll * -80}px)`;
            }
            if(t2) {
                t2.style.opacity = (scroll > 0.4 && scroll < 0.7) ? 1 : 0;
                t2.style.transform = `translateY(${(0.5 - scroll) * 50}px)`;
            }
        }

        // CARREGAMENTO DE IMAGENS
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = (loadedImages/frameCount*100) + "%";
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => { 
                        document.getElementById('loader').style.visibility = 'hidden';
                        document.body.style.overflowY = 'auto';
                    }, 500);
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    handleScroll();
                }
            };
            images.push(img);
        }

        window.addEventListener('scroll', () => requestAnimationFrame(handleScroll));
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            handleScroll();
        });
    </script>
</body>
</html>
