<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dips | Cinematic Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-dips-teal: #00C2A8;
            --color-dips-navy: #0D1B2A;
        }
        
        body { 
            background-color: #000; 
            color: white; 
            overflow-x: hidden; 
            font-family: 'Space Grotesk', sans-serif; 
        }

        .canvas-fixed {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        /* 🔥 Overlay de Transição (Fade Dissolve) */
        #fade-overlay {
            position: fixed; inset: 0;
            background: #000;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            margin-top: 20px; width: 90%; left: 5%;
            z-index: 150;
        }

        #main-timeline { height: 1200vh; }

        .ui-layer {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 50; pointer-events: none;
            text-align: center;
        }

        .text-glow { text-shadow: 0 0 40px rgba(0, 194, 168, 0.7); }
    </style>
</head>
<body class="antialiased">

    <div id="fade-overlay"></div>

    <nav class="fixed top-0 glass-navbar px-8 py-3 flex justify-between items-center opacity-0" id="nav">
        <div class="w-32"></div> 
        <img src="logo/LOGO.png" alt="Logo" class="h-10 md:h-14 w-auto object-contain">
        <div class="w-32 flex justify-end"><i data-lucide="menu" class="text-white"></i></div>
    </nav>

    <div id="main-timeline">
        <canvas id="hero-canvas" class="canvas-fixed z-10"></canvas>

        <canvas id="webgl-canvas" class="canvas-fixed z-[5]"></canvas>

        <div class="ui-layer">
            <div id="h-txt" class="opacity-0 translate-y-10">
                <h1 class="text-7xl md:text-9xl font-black uppercase tracking-tighter font-display">O FUTURO</h1>
                <h1 class="text-7xl md:text-9xl font-black text-dips-teal text-glow tracking-tighter uppercase font-display">ENERGIA.</h1>
            </div>
        </div>

        <div class="ui-layer" id="p-info" style="justify-content: flex-end; padding-bottom: 15vh; opacity: 0;">
            <h2 id="p-title" class="text-4xl md:text-6xl font-black uppercase font-display">PRODUTO</h2>
            <p id="p-desc" class="text-dips-teal uppercase tracking-[0.4em] text-xs mt-4 font-bold">ALTA PERFORMANCE</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        gsap.registerPlugin(ScrollTrigger);

        // --- 🧊 THREE.JS SCENE SETUP ---
        const canvas3d = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 2, 12);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // Luzes Dinâmicas
        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Produtos (Models)
        const productData = [
            { name: "Painel HP 160W", desc: "Captação Ultra Eficiente", img: 'produtos/produto-8942-placa-solar-policristalino-160w.jpg' },
            { name: "Controlador PWM", desc: "Gestão Inteligente de Carga", img: 'produtos/CONTROLADOR DE CARGA PWM ECP 1024 1224V 10A.png' },
            { name: "Microinversor", desc: "Conversão de Alta Fidelidade", img: 'produtos/MICROINVERSOR 1200W EGT 1200.png' }
        ];

        const meshes = [];
        const texLoader = new THREE.TextureLoader();
        productData.forEach((d, i) => {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3.5, 4),
                new THREE.MeshStandardMaterial({ map: texLoader.load(d.img), transparent: true, metalness: 0.6, roughness: 0.2 })
            );
            mesh.position.y = -i * 12; // Checkpoints da Câmera
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- 🎥 HERO VIDEO SETUP ---
        const heroCanvas = document.getElementById('hero-canvas');
        const heroCtx = heroCanvas.getContext('2d');
        const frameCount = 71;
        const images = [];
        let loaded = 0;

        function drawHero(idx) {
            if (!images[idx]) return;
            heroCanvas.width = window.innerWidth;
            heroCanvas.height = window.innerHeight;
            const img = images[idx];
            const ratio = Math.max(heroCanvas.width / img.width, heroCanvas.height / img.height);
            const w = img.width * ratio; const h = img.height * ratio;
            heroCtx.drawImage(img, (heroCanvas.width - w)/2, (heroCanvas.height - h)/2, w, h);
        }

        // --- 🔥 TIMELINE MESTRE (ORCHESTRATION) ---
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#main-timeline", start: "top top", end: "bottom bottom", scrub: 1.5
            }
        });

        // 1. Scroll do Vídeo
        let frameObj = { frame: 0 };
        tl.to(frameObj, {
            frame: frameCount - 1, duration: 4, ease: "none",
            onUpdate: () => drawHero(Math.floor(frameObj.frame))
        }, 0);

        // 2. Animação Textos Hero
        tl.to("#h-txt", { opacity: 1, y: 0, duration: 1 }, 0.5);
        tl.to("#h-txt", { opacity: 0, scale: 1.2, duration: 1 }, 2);

        // 3. 🔥 TRANSIÇÃO HOME → PRODUTOS (Fog + Fade Dissolve)
        tl.to("#fade-overlay", { opacity: 1, duration: 1 }, 3.5);
        tl.set("#hero-canvas", { display: "none" }, 4.5);
        tl.to("#fade-overlay", { opacity: 0, duration: 1 }, 4.5);

        // 4. 🔥 CAMERA MORPHING & FOG DEEPEN (Scroll Checkpoints)
        productData.forEach((p, i) => {
            tl.to(camera.position, {
                y: meshes[i].position.y,
                z: 6, // Dolly In
                duration: 3,
                ease: "power2.inOut",
                onStart: () => {
                    gsap.to("#p-info", { opacity: 1 });
                    document.getElementById('p-title').innerText = p.name;
                    document.getElementById('p-desc').innerText = p.desc;
                    // Morph do Fog
                    gsap.to(scene.fog, { near: 1, far: 8, duration: 1 });
                }
            }, 4.5 + (i * 3));
        });

        // Loop de Renderização (Smooth Lerp Anim)
        function animate() {
            requestAnimationFrame(animate);
            meshes.forEach(m => m.rotation.y = Math.sin(Date.now()*0.001)*0.15);
            renderer.render(scene, camera);
        }

        // --- CARREGAMENTO ---
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `frame/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
                loaded++;
                if (loaded === frameCount) {
                    gsap.to("#nav", { opacity: 1, delay: 1 });
                    drawHero(0);
                    animate();
                }
            };
            images.push(img);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
